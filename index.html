<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Mes Courses 🛒</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f7fa;--card:#fff;--border:#e2e8f2;--accent:#3b7ff5;--green:#16a34a;--red:#dc2626;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;--nav-h:64px;--r:14px;--rs:8px;--ff:'Nunito',sans-serif;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{background:var(--bg);font-family:var(--ff);min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:var(--ff)}
input,select{font-family:var(--ff);padding:.6rem .85rem;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);width:100%}
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.6rem 1.1rem;border-radius:var(--rs);font-weight:700}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:#fee2e2;color:var(--red)}
.btn-sm{padding:.32rem .65rem;font-size:.78rem}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:.6rem}
.page,.subpage{display:none;padding:1.2rem 1rem calc(var(--nav-h)+1.2rem);max-width:620px;margin:0 auto}
.page.show,.subpage.show{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;color:var(--text3);font-size:.65rem;font-weight:700}
.nav-btn.on{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.prod-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem}
.prod-nom{flex:1;font-weight:600}
.chk{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.chk.on{background:var(--accent);border-color:var(--accent)}
.chk svg{opacity:0;width:13px;height:13px}
.chk.on svg{opacity:1}
.sel-bar{background:var(--accent);color:#fff;border-radius:var(--r);padding:.8rem;display:none;justify-content:space-between;margin-bottom:.8rem}
.sel-bar.show{display:flex}
.cat-title{font-size:.7rem;font-weight:800;color:var(--text3);padding:.8rem .2rem .3rem;display:flex;gap:.5rem}
.cat-title::after{content:'';flex:1;height:1px;background:var(--border)}
.article-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.8rem;margin-bottom:.5rem}
.article-card.done{opacity:.6}
.article-top{display:flex;align-items:center;gap:.6rem}
.article-qty{display:flex;align-items:center;gap:.4rem;margin-top:.4rem;padding-left:2rem}
.qty-btn{width:28px;height:28px;border-radius:6px;background:#f0f3f8;border:1px solid var(--border);font-weight:700}
.liste-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.6rem;cursor:pointer}
.liste-nom{font-weight:800;margin-bottom:.2rem}
.badge{display:inline-block;padding:.1rem .5rem;border-radius:20px;font-size:.65rem;font-weight:700;margin-left:.5rem}
.badge-green{background:#dcfce7;color:var(--green)}
.badge-blue{background:#eef3fe;color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px;padding:1.5rem;width:90%;max-width:380px}
.modal-title{font-weight:900;margin-bottom:.5rem}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:30px;padding:.5rem 1.2rem;font-size:.8rem;z-index:400;display:none}
</style>
</head>
<body>

<div id="auth-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
  <div class="card" style="max-width:380px;width:100%;text-align:center">
    <div style="font-size:3rem;margin-bottom:1rem">🛒</div>
    <h1 style="font-size:1.8rem;margin-bottom:.3rem">Mes Courses</h1>
    <p style="color:var(--text2);margin-bottom:1.5rem">Gérez vos courses en famille</p>
    <div id="auth-err" style="background:#fee2e2;color:var(--red);border-radius:8px;padding:.6rem;margin-bottom:1rem;display:none"></div>
    <input id="i-email" type="email" placeholder="Email" style="margin-bottom:.8rem">
    <input id="i-pwd" type="password" placeholder="Mot de passe" style="margin-bottom:1rem">
    <button class="btn btn-primary" id="auth-btn" style="width:100%">Se connecter</button>
  </div>
</div>

<div id="app-screen" style="display:none">
  <!-- Page Catalogue -->
  <div id="page-catalogue" class="page show">
    <div class="page-title" style="font-size:1.4rem;font-weight:900;margin-bottom:1rem">📋 Catalogue</div>
    <div class="card">
      <div style="display:flex;gap:.5rem">
        <input id="c-nom" placeholder="Nom du produit" style="flex:2">
        <select id="c-cat" style="flex:1"></select>
        <button class="btn btn-primary" id="add-produit-btn">+</button>
      </div>
    </div>
    <div class="sel-bar" id="sel-bar">
      <span id="sel-count">0 sélectionné(s)</span>
      <div><button class="btn btn-sm" id="clear-sel-btn" style="background:#fff2;color:#fff">Annuler</button>
      <button class="btn btn-sm" id="add-sel-liste-btn" style="background:#fff;color:var(--accent)">Ajouter</button></div>
    </div>
    <input id="c-search" placeholder="🔍 Rechercher" style="margin-bottom:.8rem">
    <div id="cat-list"></div>
  </div>

  <!-- Page Listes -->
  <div id="page-listes" class="page">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
      <div class="page-title" style="font-size:1.4rem;font-weight:900">🛍️ Mes listes</div>
      <button class="btn btn-sm" id="toggle-dossier-btn" style="border:1px solid var(--border)">📁 Dossier</button>
    </div>
    <div id="dossier-form" class="card" style="display:none">
      <div style="display:flex;gap:.5rem">
        <input id="i-dossier" placeholder="Nouveau dossier">
        <button class="btn btn-primary btn-sm" id="add-dossier-btn">Créer</button>
      </div>
      <div id="dossiers-tags" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem"></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:.5rem">
        <input id="i-liste" placeholder="Nom de la liste">
        <select id="i-liste-dossier" style="width:auto"></select>
        <button class="btn btn-primary" id="add-liste-btn">+</button>
      </div>
    </div>
    <div style="display:flex;gap:.5rem;margin-bottom:.8rem">
      <select id="f-statut" style="width:auto"><option value="">Toutes</option><option value="en_cours">En cours</option><option value="terminee">Terminées</option></select>
      <select id="f-dossier" style="width:auto"><option value="">Tous</option></select>
    </div>
    <div id="listes-list"></div>
  </div>

  <!-- Page Détail Liste -->
  <div id="page-detail" class="subpage">
    <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem">
      <button id="close-detail-btn" style="color:var(--text2);font-weight:700">← Retour</button>
    </div>
    <div id="detail-header"></div>
    <div class="card" id="add-section">
      <button id="toggle-add-panel" style="width:100%;text-align:center;color:var(--accent);font-weight:700">+ Ajouter des produits</button>
      <div id="add-body" style="display:none;margin-top:.8rem">
        <input id="d-search" placeholder="Rechercher..." style="margin-bottom:.5rem">
        <div id="d-cat-list" style="max-height:200px;overflow:auto"></div>
        <div style="height:1px;background:var(--border);margin:.8rem 0"></div>
        <div style="display:flex;gap:.5rem">
          <input id="d-man-nom" placeholder="Nouveau produit">
          <select id="d-man-cat" style="width:auto"></select>
          <button class="btn btn-primary btn-sm" id="add-manuel-btn">+</button>
        </div>
      </div>
    </div>
    <div id="detail-articles"></div>
  </div>

  <!-- Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn on" id="nav-catalogue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M5 7h14v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7z"/></svg>Catalogue</button>
    <button class="nav-btn" id="nav-listes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h6M8 16h4"/></svg>Mes listes</button>
  </nav>
</div>

<div id="confirm-modal" class="overlay"><div class="modal"><div class="modal-title" id="confirm-title"></div><p id="confirm-msg" style="margin-bottom:1rem"></p><div style="display:flex;gap:.5rem;justify-content:flex-end"><button class="btn" id="confirm-no">Annuler</button><button class="btn btn-danger" id="confirm-yes">Confirmer</button></div></div></div>
<div id="listes-modal" class="overlay"><div class="modal"><div class="modal-title">Choisir une liste</div><div id="listes-choix" style="margin:1rem 0"></div><button class="btn" id="close-listes-modal">Fermer</button></div></div>
<div class="toast" id="toast">Message</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, getDocs, writeBatch } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const FB = {
  apiKey: "AIzaSyDMHRowm0gRH09w6qzRf89SWtE_y89KcZY",
  authDomain: "mes-courses-cf52d.firebaseapp.com",
  projectId: "mes-courses-cf52d",
  storageBucket: "mes-courses-cf52d.firebasestorage.app",
  messagingSenderId: "248641691402",
  appId: "1:248641691402:web:f36ad91dc0045d1edf24f3"
};

const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);

let UID = null;
let activeListeId = null;
let catalogue = [];
let listes = [];
let dossiers = [];
let articles = [];
let selectedIds = new Set();
let unsubCat = null, unsubListes = null, unsubDoss = null, unsubArt = null;

const CATEGORIES = [
  { id: 'legumes', label: '🥦 Légumes' }, { id: 'fruits', label: '🍎 Fruits' },
  { id: 'viande', label: '🥩 Viande' }, { id: 'poisson', label: '🐟 Poisson' },
  { id: 'laitage', label: '🥛 Laitage' }, { id: 'epicerie', label: '🥫 Épicerie' },
  { id: 'boulangerie', label: '🥖 Boulangerie' }, { id: 'autre', label: '📦 Autre' }
];

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('show'); }

let confirmCallback = null;
document.getElementById('confirm-yes').onclick = () => { if (confirmCallback) confirmCallback(); closeModal('confirm-modal'); };
document.getElementById('confirm-no').onclick = () => { closeModal('confirm-modal'); };
document.getElementById('close-listes-modal').onclick = () => closeModal('listes-modal');

function confirmAction(title, msg, callback) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = callback;
  openModal('confirm-modal');
}

// Navigation
document.getElementById('nav-catalogue').onclick = () => { goPage('catalogue'); };
document.getElementById('nav-listes').onclick = () => { goPage('listes'); };
document.getElementById('close-detail-btn').onclick = () => closeDetail();

window.goPage = function(page) {
  document.querySelectorAll('.page, .subpage').forEach(p => p.classList.remove('show'));
  document.getElementById(`page-${page}`).classList.add('show');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(`nav-${page}`).classList.add('on');
};

window.openDetail = function(listeId) {
  activeListeId = listeId;
  if (unsubArt) unsubArt();
  unsubArt = onSnapshot(collection(db, 'users', UID, 'listes', listeId, 'articles'), snap => {
    articles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderDetail();
  });
  document.querySelectorAll('.page, .subpage').forEach(p => p.classList.remove('show'));
  document.getElementById('page-detail').classList.add('show');
  document.getElementById('add-body').style.display = 'none';
  renderDetailHeader();
  renderAvailableProducts();
};

window.closeDetail = function() {
  if (unsubArt) { unsubArt(); unsubArt = null; }
  activeListeId = null;
  goPage('listes');
};

// Gestion catalogue
window.addProduit = async function() {
  const nom = document.getElementById('c-nom').value.trim();
  const cat = document.getElementById('c-cat').value;
  if (!nom) return;
  if (catalogue.some(p => p.nom === nom)) { toast('Déjà existant'); return; }
  await addDoc(collection(db, 'users', UID, 'catalogue'), { nom, categorie: cat, createdAt: serverTimestamp() });
  document.getElementById('c-nom').value = '';
  toast('Produit ajouté');
};

window.delProduit = function(id, nom) {
  confirmAction('Supprimer', `Supprimer "${nom}" ?`, async () => {
    await deleteDoc(doc(db, 'users', UID, 'catalogue', id));
    selectedIds.delete(id);
    updateSelBar();
    toast('Produit supprimé');
  });
};

window.toggleSel = function(id) {
  selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  updateSelBar();
  renderCatalogue();
};

window.clearSel = function() { selectedIds.clear(); updateSelBar(); renderCatalogue(); };
function updateSelBar() { 
  const bar = document.getElementById('sel-bar');
  bar.classList.toggle('show', selectedIds.size > 0);
  document.getElementById('sel-count').textContent = `${selectedIds.size} sélectionné(s)`;
}

window.addSelectedToList = async function() {
  const activeLists = listes.filter(l => l.statut === 'en_cours');
  if (!activeLists.length) { toast('Créez d\'abord une liste'); return; }
  if (activeLists.length === 1) return addToSpecificList(activeLists[0].id, activeLists[0].nom);
  const container = document.getElementById('listes-choix');
  container.innerHTML = activeLists.map(l => `<button class="btn" style="width:100%;margin-bottom:.5rem;border:1px solid var(--border)" onclick="addToSpecificList('${l.id}','${l.nom.replace(/'/g,"\\'")}')">${l.nom}</button>`).join('');
  openModal('listes-modal');
};

window.addToSpecificList = async function(listeId, listNom) {
  closeModal('listes-modal');
  const produits = catalogue.filter(p => selectedIds.has(p.id));
  const snap = await getDocs(collection(db, 'users', UID, 'listes', listeId, 'articles'));
  const existing = new Set(snap.docs.map(d => d.data().nom));
  let added = 0;
  for (const p of produits) {
    if (!existing.has(p.nom)) {
      await addDoc(collection(db, 'users', UID, 'listes', listeId, 'articles'), {
        nom: p.nom, categorie: p.categorie, quantite: 1, unite: '', coche: false
      });
      added++;
    }
  }
  selectedIds.clear();
  updateSelBar();
  renderCatalogue();
  toast(`${added} produit(s) ajouté(s) à "${listNom}"`);
};

window.addFast = async function(e, produitId, nom, cat) {
  e.stopPropagation();
  const activeLists = listes.filter(l => l.statut === 'en_cours');
  if (!activeLists.length) { toast('Créez une liste d\'abord'); return; }
  const liste = activeLists[0];
  const snap = await getDocs(collection(db, 'users', UID, 'listes', liste.id, 'articles'));
  if (snap.docs.some(d => d.data().nom === nom)) { toast('Déjà dans la liste'); return; }
  await addDoc(collection(db, 'users', UID, 'listes', liste.id, 'articles'), {
    nom, categorie: cat, quantite: 1, unite: '', coche: false
  });
  toast(`"${nom}" ajouté à "${liste.nom}"`);
};

function renderCatalogue() {
  const search = document.getElementById('c-search')?.value.toLowerCase() || '';
  const filtered = catalogue.filter(p => p.nom.toLowerCase().includes(search));
  let html = '';
  for (const cat of CATEGORIES) {
    const items = filtered.filter(p => p.categorie === cat.id);
    if (!items.length) continue;
    html += `<div class="cat-title">${cat.label}</div>`;
    for (const p of items) {
      const isSel = selectedIds.has(p.id);
      html += `<div class="prod-row">
        <div class="chk ${isSel ? 'on' : ''}" onclick="toggleSel('${p.id}')"><svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.5"><path d="M2 7L5 10L11 3"/></svg></div>
        <span class="prod-nom">${p.nom}</span>
        <button class="btn btn-sm" style="color:var(--accent)" onclick="addFast(event,'${p.id}','${p.nom.replace(/'/g,"\\'")}','${p.categorie}')">+ Liste</button>
        <button class="btn btn-danger btn-sm" onclick="delProduit('${p.id}','${p.nom.replace(/'/g,"\\'")}')">🗑</button>
      </div>`;
    }
  }
  document.getElementById('cat-list').innerHTML = html || '<div class="empty" style="text-align:center;padding:2rem">Aucun produit</div>';
}

// Gestion listes
window.addListe = async function() {
  const nom = document.getElementById('i-liste').value.trim();
  const dossier = document.getElementById('i-liste-dossier').value;
  if (!nom) return;
  const ref = await addDoc(collection(db, 'users', UID, 'listes'), { nom, dossier, statut: 'en_cours', createdAt: serverTimestamp() });
  document.getElementById('i-liste').value = '';
  openDetail(ref.id);
};

window.toggleListeStatus = async function(id, current) {
  const newStatus = current === 'terminee' ? 'en_cours' : 'terminee';
  await updateDoc(doc(db, 'users', UID, 'listes', id), { statut: newStatus });
  toast(newStatus === 'terminee' ? 'Liste terminée !' : 'Liste réouverte');
  if (activeListeId === id) renderDetailHeader();
};

window.renommerListe = async function(id, oldName) {
  const newName = prompt('Nouveau nom :', oldName);
  if (!newName?.trim()) return;
  await updateDoc(doc(db, 'users', UID, 'listes', id), { nom: newName.trim() });
};

window.supprimerListe = async function(id, nom) {
  confirmAction('Supprimer', `Supprimer "${nom}" ?`, async () => {
    const articlesRef = collection(db, 'users', UID, 'listes', id, 'articles');
    const snap = await getDocs(articlesRef);
    const batch = writeBatch(db);
    for (const d of snap.docs) batch.delete(d.ref);
    batch.delete(doc(db, 'users', UID, 'listes', id));
    await batch.commit();
    if (activeListeId === id) closeDetail();
    toast('Liste supprimée');
  });
};

function renderListes() {
  const fStatut = document.getElementById('f-statut').value;
  const fDossier = document.getElementById('f-dossier').value;
  let filtered = listes;
  if (fStatut) filtered = filtered.filter(l => l.statut === fStatut);
  if (fDossier) filtered = filtered.filter(l => l.dossier === fDossier);
  let html = '';
  for (const l of filtered) {
    const badge = l.statut === 'terminee' ? '<span class="badge badge-green">✓ Terminée</span>' : '<span class="badge badge-blue">En cours</span>';
    html += `<div class="liste-card" onclick="openDetail('${l.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="liste-nom">${l.nom} ${badge}</div><div style="font-size:.7rem;color:var(--text2)">${l.dossier ? '📁 ' + l.dossier : ''}</div></div>
        <div><button class="btn btn-sm" style="border:1px solid var(--border)" onclick="event.stopPropagation();renommerListe('${l.id}','${l.nom.replace(/'/g,"\\'")}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();supprimerListe('${l.id}','${l.nom.replace(/'/g,"\\'")}')">🗑</button></div>
      </div>
    </div>`;
  }
  document.getElementById('listes-list').innerHTML = html || '<div style="text-align:center;padding:2rem">Aucune liste</div>';
}

// Dossiers
window.toggleDossierForm = function() {
  const f = document.getElementById('dossier-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
};
window.addDossier = async function() {
  const nom = document.getElementById('i-dossier').value.trim();
  if (!nom) return;
  if (dossiers.some(d => d.nom === nom)) { toast('Déjà existe'); return; }
  await addDoc(collection(db, 'users', UID, 'dossiers'), { nom, createdAt: serverTimestamp() });
  document.getElementById('i-dossier').value = '';
  toast(`Dossier "${nom}" créé`);
};
window.delDossier = async function(id, nom) {
  confirmAction('Supprimer', `Supprimer "${nom}" ?`, async () => { await deleteDoc(doc(db, 'users', UID, 'dossiers', id)); });
};
function updateDossierSelects() {
  const opts = '<option value="">Sans dossier</option>' + dossiers.map(d => `<option value="${d.nom}">${d.nom}</option>`).join('');
  document.getElementById('i-liste-dossier').innerHTML = opts;
  document.getElementById('f-dossier').innerHTML = '<option value="">Tous</option>' + dossiers.map(d => `<option value="${d.nom}">📁 ${d.nom}</option>`).join('');
  const tagsDiv = document.getElementById('dossiers-tags');
  tagsDiv.innerHTML = dossiers.map(d => `<div style="display:flex;align-items:center;gap:.3rem;background:#f0f3f8;border-radius:20px;padding:.2rem .6rem"><span>📁 ${d.nom}</span><button onclick="delDossier('${d.id}','${d.nom.replace(/'/g,"\\'")}')" style="color:var(--red)">✕</button></div>`).join('');
}

// Détail liste
function renderDetailHeader() {
  const liste = listes.find(l => l.id === activeListeId);
  if (!liste) return;
  const total = articles.length;
  const checked = articles.filter(a => a.coche).length;
  const pct = total ? Math.round(checked/total*100) : 0;
  document.getElementById('detail-header').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
      <h2 style="font-size:1.3rem">${liste.nom}</h2>
      <button class="btn ${liste.statut === 'terminee' ? 'btn-primary' : 'btn-success'}" style="padding:.3rem .8rem" onclick="toggleListeStatus('${liste.id}','${liste.statut}')">${liste.statut === 'terminee' ? 'Réouvrir' : 'Terminer'}</button>
    </div>
    ${total ? `<div>${checked}/${total} (${pct}%)</div><div style="height:4px;background:#e2e8f2;border-radius:2px;margin:.5rem 0"><div style="width:${pct}%;height:100%;background:var(--green);border-radius:2px"></div></div>` : ''}
  `;
}

window.toggleAddPanel = function() {
  const body = document.getElementById('add-body');
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
  if (body.style.display === 'block') renderAvailableProducts();
};

window.renderAvailableProducts = function() {
  const search = document.getElementById('d-search')?.value.toLowerCase() || '';
  const existingNames = new Set(articles.map(a => a.nom));
  const available = catalogue.filter(p => !existingNames.has(p.nom) && p.nom.toLowerCase().includes(search));
  let html = '';
  for (const cat of CATEGORIES) {
    const items = available.filter(p => p.categorie === cat.id);
    if (!items.length) continue;
    html += `<div class="cat-title">${cat.label}</div>`;
    for (const p of items) {
      html += `<div class="prod-row" style="cursor:pointer" onclick="addToCurrentList('${p.id}','${p.nom.replace(/'/g,"\\'")}','${p.categorie}')"><span style="color:var(--accent);font-weight:800">+</span><span>${p.nom}</span></div>`;
    }
  }
  document.getElementById('d-cat-list').innerHTML = html || '<p style="padding:.5rem;color:var(--text2)">Aucun produit disponible</p>';
};

window.addToCurrentList = async function(id, nom, cat) {
  await addDoc(collection(db, 'users', UID, 'listes', activeListeId, 'articles'), {
    nom, categorie: cat, quantite: 1, unite: '', coche: false
  });
  toast(`"${nom}" ajouté`);
};

window.addManualProduct = async function() {
  const nom = document.getElementById('d-man-nom').value.trim();
  const cat = document.getElementById('d-man-cat').value;
  if (!nom) return;
  await addDoc(collection(db, 'users', UID, 'listes', activeListeId, 'articles'), {
    nom, categorie: cat, quantite: 1, unite: '', coche: false
  });
  document.getElementById('d-man-nom').value = '';
  toast(`"${nom}" ajouté`);
};

window.toggleCheck = async function(id, current) {
  await updateDoc(doc(db, 'users', UID, 'listes', activeListeId, 'articles', id), { coche: !current });
};

window.changeQuantity = async function(id, delta) {
  const art = articles.find(a => a.id === id);
  if (!art) return;
  await updateDoc(doc(db, 'users', UID, 'listes', activeListeId, 'articles', id), { quantite: Math.max(0.5, (art.quantite || 1) + delta) });
};

window.changeUnit = async function(id, unit) {
  await updateDoc(doc(db, 'users', UID, 'listes', activeListeId, 'articles', id), { unite: unit });
};

window.deleteArticle = function(id, nom) {
  confirmAction('Retirer', `Retirer "${nom}" de la liste ?`, async () => {
    await deleteDoc(doc(db, 'users', UID, 'listes', activeListeId, 'articles', id));
  });
};

function renderDetail() {
  renderDetailHeader();
  const liste = listes.find(l => l.id === activeListeId);
  const isTerminee = liste?.statut === 'terminee';
  let html = '';
  for (const cat of CATEGORIES) {
    const items = articles.filter(a => a.categorie === cat.id);
    if (!items.length) continue;
    html += `<div class="cat-title">${cat.label}</div>`;
    for (const a of items) {
      const units = ['', 'kg', 'g', 'L', 'cl', 'pièce(s)', 'boîte(s)'];
      const unitOptions = units.map(u => `<option value="${u}" ${a.unite === u ? 'selected' : ''}>${u || '—'}</option>`).join('');
      html += `<div class="article-card ${a.coche ? 'done' : ''}">
        <div class="article-top">
          <div class="chk ${a.coche ? 'on' : ''}" onclick="${isTerminee ? '' : `toggleCheck('${a.id}',${a.coche})`}"><svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.5"><path d="M2 7L5 10L11 3"/></svg></div>
          <span style="flex:1;font-weight:600">${a.nom}</span>
          ${!isTerminee ? `<button class="btn btn-danger btn-sm" onclick="deleteArticle('${a.id}','${a.nom.replace(/'/g,"\\'")}')">🗑</button>` : ''}
        </div>
        ${!isTerminee ? `<div class="article-qty">
          <button class="qty-btn" onclick="changeQuantity('${a.id}',-1)">−</button>
          <span class="qty-val">${a.quantite || 1}</span>
          <button class="qty-btn" onclick="changeQuantity('${a.id}',1)">+</button>
          <select class="qty-unite" onchange="changeUnit('${a.id}',this.value)">${unitOptions}</select>
        </div>` : `<div style="font-size:.75rem;padding-left:2rem;color:var(--text2)">${a.quantite || 1} ${a.unite || ''}</div>`}
      </div>`;
    }
  }
  document.getElementById('detail-articles').innerHTML = html || '<div style="text-align:center;padding:2rem">Liste vide</div>';
  renderAvailableProducts();
}

// Listeners
function startListeners() {
  unsubCat = onSnapshot(collection(db, 'users', UID, 'catalogue'), snap => {
    catalogue = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCatalogue();
    if (document.getElementById('add-body')?.style.display === 'block') renderAvailableProducts();
  });
  unsubListes = onSnapshot(collection(db, 'users', UID, 'listes'), snap => {
    listes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderListes();
    if (activeListeId) renderDetailHeader();
  });
  unsubDoss = onSnapshot(collection(db, 'users', UID, 'dossiers'), snap => {
    dossiers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateDossierSelects();
  });
}

function stopListeners() {
  if (unsubCat) unsubCat();
  if (unsubListes) unsubListes();
  if (unsubDoss) unsubDoss();
  if (unsubArt) unsubArt();
}

// Auth
document.getElementById('auth-btn').onclick = async () => {
  const email = document.getElementById('i-email').value.trim();
  const pwd = document.getElementById('i-pwd').value;
  const errDiv = document.getElementById('auth-err');
  errDiv.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch (e) {
    errDiv.textContent = 'Email ou mot de passe incorrect';
    errDiv.style.display = 'block';
  }
};
document.getElementById('i-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-btn').click(); });

onAuthStateChanged(auth, async user => {
  if (user) {
    UID = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    startListeners();
    // Init catalogue par défaut
    const catSnap = await getDocs(collection(db, 'users', UID, 'catalogue'));
    if (catSnap.empty) {
      const defaults = [
        { nom: 'Carottes', categorie: 'legumes' }, { nom: 'Tomates', categorie: 'legumes' },
        { nom: 'Pommes', categorie: 'fruits' }, { nom: 'Bananes', categorie: 'fruits' },
        { nom: 'Poulet', categorie: 'viande' }, { nom: "Côtelettes d'agneau", categorie: 'viande' },
        { nom: 'Saumon', categorie: 'poisson' }, { nom: 'Lait', categorie: 'laitage' },
        { nom: 'Œufs', categorie: 'laitage' }, { nom: 'Pâtes', categorie: 'epicerie' },
        { nom: 'Pain', categorie: 'boulangerie' }
      ];
      for (const p of defaults) await addDoc(collection(db, 'users', UID, 'catalogue'), { ...p, createdAt: serverTimestamp() });
    }
    goPage('catalogue');
  } else {
    stopListeners();
    UID = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

// Boutons UI
document.getElementById('add-produit-btn').onclick = () => window.addProduit();
document.getElementById('clear-sel-btn').onclick = () => window.clearSel();
document.getElementById('add-sel-liste-btn').onclick = () => window.addSelectedToList();
document.getElementById('toggle-dossier-btn').onclick = () => window.toggleDossierForm();
document.getElementById('add-dossier-btn').onclick = () => window.addDossier();
document.getElementById('add-liste-btn').onclick = () => window.addListe();
document.getElementById('toggle-add-panel').onclick = () => window.toggleAddPanel();
document.getElementById('add-manuel-btn').onclick = () => window.addManualProduct();
document.getElementById('c-search').oninput = () => renderCatalogue();
document.getElementById('d-search').oninput = () => renderAvailableProducts();
document.getElementById('f-statut').onchange = () => renderListes();
document.getElementById('f-dossier').onchange = () => renderListes();

// Initialisation des selects
function initSelects() {
  const opts = CATEGORIES.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
  document.getElementById('c-cat').innerHTML = opts;
  document.getElementById('d-man-cat').innerHTML = opts;
}
initSelects();
</script>
