<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d0f18"/>
<title>Mes Courses 🛒</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════ RESET & VARIABLES */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;
  --s1:#ffffff;
  --s2:#e8edf3;
  --s3:#dde3ec;
  --border:#c8d2e0;
  --border2:#b0bdd0;
  --accent:#4f6ef7;
  --accent-g:linear-gradient(135deg,#4f6ef7,#a78bfa);
  --green:#16a34a;
  --red:#dc2626;
  --orange:#ea580c;
  --yellow:#d97706;
  --text:#1a2035;
  --t2:#4a5570;
  --t3:#8090aa;
  --r:12px;
  --rsm:8px;
  --nav:62px;
  --ff:'Bricolage Grotesque',sans-serif;
  --fb:'Instrument Sans',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--ff);font-weight:700;line-height:1.15}
button{cursor:pointer;border:none;background:none;font-family:var(--fb);font-size:1rem;transition:all .18s;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:var(--fb);font-size:0.95rem;background:var(--s3);border:1.5px solid var(--border);color:var(--text);border-radius:var(--rsm);padding:.6rem .9rem;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,.15)}
input::placeholder{color:var(--t3)}
select option{background:var(--s1);color:var(--text)}
a{text-decoration:none;color:inherit}

/* ═══════════════════════════════════════════ LAYOUT */
#app{min-height:100vh;display:flex;flex-direction:column}
.page{display:none;flex:1;padding:1.2rem 1rem calc(var(--nav)+1rem);max-width:640px;margin:0 auto;width:100%;animation:slideUp .28s ease both}
.page.active{display:block}
.inner-page{display:none;flex:1;padding:1.2rem 1rem calc(var(--nav)+1rem);max-width:640px;margin:0 auto;width:100%;animation:slideUp .28s ease both}
.inner-page.active{display:block}

/* ═══════════════════════════════════════════ AUTH */
#auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(79,110,247,.2),transparent)}
.auth-box{width:100%;max-width:380px}
.logo-circle{width:68px;height:68px;border-radius:20px;background:var(--accent-g);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;box-shadow:0 8px 32px rgba(79,110,247,.4)}
.auth-title{text-align:center;font-size:1.9rem;margin-bottom:.3rem}
.auth-sub{text-align:center;color:var(--t2);font-size:.9rem;margin-bottom:1.8rem}
.tab-bar{display:flex;gap:4px;background:var(--s2);border-radius:var(--rsm);padding:4px;margin-bottom:1.3rem}
.tab-btn{flex:1;padding:.5rem;border-radius:6px;font-weight:600;font-size:.88rem;color:var(--t2);transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(79,110,247,.4)}

/* ═══════════════════════════════════════════ BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.4rem 1.4rem;border-radius:var(--rsm);color:var(--t3);font-size:.68rem;font-weight:600;letter-spacing:.03em;transition:all .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:23px;height:23px;stroke-width:1.8;transition:stroke-width .2s}
.nav-btn.active svg{stroke-width:2.3}

/* ═══════════════════════════════════════════ CARDS & COMPONENTS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem}
.card+.card{margin-top:.6rem}
.section-title{font-size:1.25rem;font-weight:800;display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem}
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .55rem;border-radius:20px;font-size:.7rem;font-weight:700}
.badge-green{background:rgba(22,163,74,.12);color:var(--green)}
.badge-orange{background:rgba(251,146,60,.12);color:var(--orange)}

/* ═══════════════════════════════════════════ BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:var(--rsm);font-weight:600;font-size:.88rem;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(79,110,247,.3)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{color:var(--t2);background:transparent}
.btn-ghost:hover{background:var(--s3);color:var(--text)}
.btn-danger{background:rgba(220,38,38,.1);color:var(--red)}
.btn-danger:hover{background:rgba(220,38,38,.2)}
.btn-success{background:rgba(22,163,74,.1);color:var(--green)}
.btn-success:hover{background:rgba(22,163,74,.2)}
.btn-sm{padding:.3rem .65rem;font-size:.78rem;border-radius:6px}
.btn-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}

/* ═══════════════════════════════════════════ FORMS */
.form-group{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.75rem}
.form-label{font-size:.78rem;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.form-row{display:flex;gap:.5rem;align-items:flex-end}
.form-row>*{flex:1}

/* ═══════════════════════════════════════════ CHECKBOXES */
.check-row{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:var(--rsm);transition:background .15s;cursor:pointer}
.check-row:hover{background:var(--s2)}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chk.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,.2)}
.chk.on svg{opacity:1}
.chk svg{opacity:0;transition:opacity .2s;width:13px;height:13px}
.chk-label{flex:1;font-size:.93rem}
.chk-label.done{text-decoration:line-through;color:var(--t3)}

/* ═══════════════════════════════════════════ CATEGORY HEADERS */
.cat-header{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:.9rem .2rem .3rem;display:flex;align-items:center;gap:.6rem}
.cat-header::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══════════════════════════════════════════ PROGRESS */
.progress-bar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin:.4rem 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ═══════════════════════════════════════════ MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:1rem;animation:fadeIn .2s ease}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:var(--r) var(--r) var(--r) var(--r);padding:1.4rem;width:100%;max-width:420px;animation:slideUp .25s ease}
@media(min-width:480px){.overlay{align-items:center}}
.modal-title{font-size:1.05rem;font-weight:800;margin-bottom:.3rem}
.modal-sub{font-size:.85rem;color:var(--t2);margin-bottom:1.1rem}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.1rem}

/* ═══════════════════════════════════════════ TOAST */
.toast{position:fixed;bottom:calc(var(--nav) + .8rem);left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);border-radius:30px;padding:.55rem 1.2rem;font-size:.85rem;font-weight:500;z-index:300;white-space:nowrap;animation:slideUp .25s ease;pointer-events:none;max-width:90vw;text-align:center}

/* ═══════════════════════════════════════════ EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--t2)}
.empty-icon{font-size:3.5rem;margin-bottom:.8rem;opacity:.4}
.empty p{font-size:.88rem;line-height:1.6}

/* ═══════════════════════════════════════════ LISTE CARD */
.liste-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.65rem;transition:border-color .2s;cursor:pointer}
.liste-card:hover{border-color:var(--border2)}
.liste-card.done{border-color:rgba(22,163,74,.2)}
.liste-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.liste-nom{font-family:var(--ff);font-weight:700;font-size:.98rem;margin-bottom:.15rem}
.liste-meta{font-size:.75rem;color:var(--t3);display:flex;gap:.6rem;flex-wrap:wrap}

/* ═══════════════════════════════════════════ QTY */
.qty-wrap{display:flex;align-items:center;gap:.4rem}
.qty-btn{width:28px;height:28px;border-radius:6px;background:var(--s3);border:1px solid var(--border);color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qty-btn:hover{background:var(--border)}
.qty-num{width:48px;text-align:center;padding:.3rem .2rem}

/* ═══════════════════════════════════════════ MENU DROPDOWN */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{position:absolute;right:0;top:100%;margin-top:4px;z-index:50;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;display:none}
.dropdown-menu.open{display:block;animation:fadeIn .15s ease}
.dropdown-item{display:block;width:100%;text-align:left;padding:.65rem 1rem;font-size:.85rem;color:var(--text);transition:background .15s;cursor:pointer;border:none;background:none;font-family:var(--fb)}
.dropdown-item:hover{background:var(--s3)}
.dropdown-item.danger{color:var(--red)}

/* ═══════════════════════════════════════════ PROFIL AVATAR */
.avatar{width:64px;height:64px;border-radius:50%;background:var(--accent-g);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;font-family:var(--ff);color:#fff;box-shadow:0 4px 20px rgba(79,110,247,.3)}

/* ═══════════════════════════════════════════ ANIMATIONS */
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ═══════════════════════════════════════════ BACK HEADER */
.back-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1.1rem}
.back-btn{display:flex;align-items:center;gap:.3rem;color:var(--t2);font-size:.85rem;font-weight:500;padding:.3rem .1rem}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:18px;height:18px}

/* ═══════════════════════════════════════════ ERROR BOX */
.err{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);border-radius:var(--rsm);padding:.65rem .9rem;font-size:.83rem;color:var(--red);margin-bottom:.8rem}

/* ═══════════════════════════════════════════ LOADING */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:3rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ══════════════════════════ AUTH -->
<div id="auth-wrap">
  <div class="auth-box">
    <div class="logo-circle">🛒</div>
    <h1 class="auth-title">Mes Courses</h1>
    <p class="auth-sub">Gérez vos courses en famille</p>
    <div class="card">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchAuthTab('login')">Connexion</button>
        <button class="tab-btn" onclick="switchAuthTab('register')">Inscription</button>
      </div>
      <div id="auth-err" class="err" style="display:none"></div>
      <div id="field-prenom" class="form-group" style="display:none">
        <label class="form-label">Prénom</label>
        <input id="inp-prenom" placeholder="Ex : Marie"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="inp-email" type="email" placeholder="email@exemple.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input id="inp-pwd" type="password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:.75rem;font-size:.98rem" onclick="handleAuth()">
        Se connecter
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════ APP -->
<div id="app" style="display:none">

  <!-- CATALOGUE PAGE -->
  <div id="page-catalogue" class="page active">
    <h2 class="section-title">📋 Catalogue</h2>
    <!-- Ajout produit -->
    <div class="card" style="margin-bottom:1rem">
      <div class="form-row" style="flex-wrap:wrap;gap:.5rem">
        <input id="cat-nom" placeholder="Nom du produit…" style="min-width:0;flex:2" onkeydown="if(event.key==='Enter')ajouterProduitCatalogue()"/>
        <select id="cat-cat" style="flex:1;min-width:120px">
          <option value="legumes">🥦 Légumes</option>
          <option value="fruits">🍎 Fruits</option>
          <option value="viande">🥩 Viande</option>
          <option value="poisson">🐟 Poisson</option>
          <option value="laitage">🥛 Laitage & Œufs</option>
          <option value="epicerie">🥫 Épicerie</option>
          <option value="boulangerie">🥖 Boulangerie</option>
          <option value="surgeles">🧊 Surgelés</option>
          <option value="boissons">🥤 Boissons</option>
          <option value="hygiene">🧴 Hygiène</option>
          <option value="entretien">🧹 Entretien</option>
          <option value="autre">📦 Autre</option>
        </select>
        <button class="btn btn-primary" onclick="ajouterProduitCatalogue()">+ Ajouter</button>
      </div>
    </div>
    <!-- Barre sélection liste -->
    <div id="cat-selection-bar" style="display:none;margin-bottom:.8rem">
      <div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:.8rem;background:rgba(79,110,247,.1);border-color:rgba(79,110,247,.3)">
        <span id="cat-sel-count" style="font-size:.88rem;font-weight:600;color:var(--accent)">0 sélectionné(s)</span>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-ghost btn-sm" onclick="clearSelection()">Annuler</button>
          <button class="btn btn-primary btn-sm" onclick="ouvrirModalAjoutListe()">➕ Ajouter à une liste</button>
        </div>
      </div>
    </div>
    <!-- Recherche -->
    <input id="cat-search" placeholder="🔍 Rechercher…" style="margin-bottom:.8rem" oninput="renderCatalogue()"/>
    <!-- Liste produits -->
    <div id="cat-list"></div>
  </div>

  <!-- LISTES PAGE -->
  <div id="page-listes" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <h2 class="section-title" style="margin-bottom:0">🛍️ Mes listes</h2>
      <button class="btn btn-ghost btn-sm" onclick="toggleCreerDossier()">📁 Dossier</button>
    </div>
    <!-- Créer dossier -->
    <div id="creer-dossier-form" style="display:none" class="card" style="margin-bottom:.8rem">
      <div class="form-row">
        <input id="inp-dossier" placeholder="Nom du dossier…"/>
        <button class="btn btn-primary" onclick="creerDossier()" style="flex:none">Créer</button>
        <button class="btn btn-ghost" onclick="toggleCreerDossier()" style="flex:none">✕</button>
      </div>
      <div id="dossiers-list" style="margin-top:.7rem;display:flex;flex-wrap:wrap;gap:.4rem"></div>
    </div>
    <!-- Nouvelle liste -->
    <div class="card" style="margin-bottom:1rem">
      <div class="form-row" style="flex-wrap:wrap">
        <input id="inp-liste-nom" placeholder="Nouvelle liste…" onkeydown="if(event.key==='Enter')creerListe()"/>
        <select id="inp-liste-dossier" style="flex:none;width:auto">
          <option value="">Sans dossier</option>
        </select>
        <button class="btn btn-primary" onclick="creerListe()" style="flex:none">+ Créer</button>
      </div>
    </div>
    <!-- Filtres -->
    <div style="display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap">
      <select id="filter-statut" onchange="renderListes()" style="width:auto;flex:none">
        <option value="">Toutes</option>
        <option value="en_cours">En cours</option>
        <option value="terminee">Terminées</option>
      </select>
      <select id="filter-dossier" onchange="renderListes()" style="width:auto;flex:none">
        <option value="">Tous les dossiers</option>
      </select>
    </div>
    <div id="listes-list"></div>
  </div>

  <!-- PROFIL PAGE -->
  <div id="page-profil" class="page">
    <h2 class="section-title">👤 Mon Profil</h2>
    <!-- Avatar -->
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
      <div class="avatar" id="profil-avatar">?</div>
      <div>
        <div id="profil-nom" style="font-weight:700;font-size:1.05rem"></div>
        <div id="profil-email" style="color:var(--t2);font-size:.85rem"></div>
      </div>
    </div>
    <!-- Modifier prénom -->
    <div class="card" style="margin-bottom:.8rem">
      <div style="font-size:.82rem;font-weight:600;color:var(--t2);margin-bottom:.8rem">✏️ MODIFIER LE PRÉNOM</div>
      <div class="form-group">
        <input id="inp-new-nom" placeholder="Nouveau prénom"/>
      </div>
      <button class="btn btn-primary btn-sm" onclick="updateNom()">Enregistrer</button>
    </div>
    <!-- Changer mot de passe -->
    <div class="card" style="margin-bottom:.8rem">
      <div style="font-size:.82rem;font-weight:600;color:var(--t2);margin-bottom:.8rem">🔒 CHANGER LE MOT DE PASSE</div>
      <div class="form-group">
        <label class="form-label">Mot de passe actuel</label>
        <input id="inp-pwd-cur" type="password" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input id="inp-pwd-new" type="password" placeholder="6 caractères min."/>
      </div>
      <button class="btn btn-primary btn-sm" onclick="updatePwd()">Modifier</button>
    </div>
    <button class="btn btn-danger" style="width:100%;padding:.75rem;margin-top:.5rem" onclick="deconnexion()">🚪 Se déconnecter</button>
  </div>

  <!-- LISTE DÉTAIL (inner page, pas dans la nav) -->
  <div id="page-detail" class="inner-page">
    <div class="back-header">
      <button class="back-btn" onclick="retourListes()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Mes listes
      </button>
    </div>
    <div id="detail-header"></div>
    <!-- Ajout depuis catalogue -->
    <div class="card" id="detail-add-section" style="margin-bottom:.8rem">
      <button class="btn btn-ghost" style="width:100%;color:var(--accent);font-weight:700" onclick="toggleDetailCat()">
        📋 Ajouter depuis le catalogue
      </button>
      <div id="detail-cat-panel" style="display:none;margin-top:.8rem">
        <input id="detail-cat-search" placeholder="🔍 Rechercher…" oninput="renderDetailCat()" style="margin-bottom:.6rem"/>
        <div id="detail-cat-list" style="max-height:240px;overflow-y:auto"></div>
      </div>
      <!-- Ajout manuel -->
      <div style="border-top:1px solid var(--border);margin-top:.8rem;padding-top:.8rem">
        <div class="form-row" style="flex-wrap:wrap">
          <input id="detail-man-nom" placeholder="Ajouter manuellement…" onkeydown="if(event.key==='Enter')ajouterManuel()"/>
          <select id="detail-man-cat" style="flex:none;width:auto">
            <option value="legumes">🥦 Légumes</option>
            <option value="fruits">🍎 Fruits</option>
            <option value="viande">🥩 Viande</option>
            <option value="poisson">🐟 Poisson</option>
            <option value="laitage">🥛 Laitage & Œufs</option>
            <option value="epicerie">🥫 Épicerie</option>
            <option value="boulangerie">🥖 Boulangerie</option>
            <option value="surgeles">🧊 Surgelés</option>
            <option value="boissons">🥤 Boissons</option>
            <option value="hygiene">🧴 Hygiène</option>
            <option value="entretien">🧹 Entretien</option>
            <option value="autre">📦 Autre</option>
          </select>
          <button class="btn btn-primary" onclick="ajouterManuel()" style="flex:none">+ Ajouter</button>
        </div>
      </div>
    </div>
    <div id="detail-articles"></div>
  </div>

  <!-- BOTTOM NAV -->

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';

         onSnapshot, query, orderBy, serverTimestamp, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

/* ════════════════════════════════════ ⚙️ CONFIG FIREBASE
   Remplacez les valeurs ci-dessous par celles de votre projet Firebase.
   Firebase Console → Paramètres → Vos applications → Config web              */
const firebaseConfig = {
  apiKey:            "AIzaSyDMHRowm0gRH09w6qzRf89SWtE_y89KcZY",

  storageBucket:     "mes-courses-cf52d.firebasestorage.app",

};
/* ══════════════════════════════════════════════════════════════════════════  */

const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);

/* ────────────────────────────────────── CATÉGORIES */
const CATS = [
  {id:'legumes',      label:'🥦 Légumes'},
  {id:'fruits',       label:'🍎 Fruits'},
  {id:'viande',       label:'🥩 Viande'},
  {id:'poisson',      label:'🐟 Poisson'},
  {id:'laitage',      label:'🥛 Laitage & Œufs'},
  {id:'epicerie',     label:'🥫 Épicerie'},
  {id:'boulangerie',  label:'🥖 Boulangerie'},
  {id:'surgeles',     label:'🧊 Surgelés'},
  {id:'boissons',     label:'🥤 Boissons'},
  {id:'hygiene',      label:'🧴 Hygiène'},
  {id:'entretien',    label:'🧹 Entretien'},
  {id:'autre',        label:'📦 Autre'},
];
function catLabel(id){return (CATS.find(c=>c.id===id)||CATS.at(-1)).label}
const UNITES=['','kg','g','L','cl','pièce(s)','boîte(s)','sachet(s)','bouteille(s)','paquet(s)'];

/* ────────────────────────────────────── STATE */
let uid = null;
let authMode = 'login';
let currentPage = 'catalogue';
let currentListeId = null;
// Données en temps réel
let catalogue = [], listes = [], dossiers = [], articles = [];
let unsubCat=null, unsubListes=null, unsubDossiers=null, unsubArticles=null;
let selectionCat = new Set(); // ids sélectionnés dans catalogue

/* ────────────────────────────────────── UTILS */
function uid_path(...parts){ return ['users', uid, ...parts].join('/') }
function col(...parts){ return collection(db, ...parts.join('/').split('/')) }
function docRef(...parts){ return doc(db, ...parts.join('/').split('/')) }

function toast(msg, dur=2400){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',dur);
}
function openModal(id){ document.getElementById(id).classList.add('open') }
function closeModal(id){ document.getElementById(id).classList.remove('open') }
window.closeModal=closeModal;

// Fermer dropdown au clic ailleurs
document.addEventListener('click',e=>{
  if(!e.target.closest('.dropdown')) document.querySelectorAll('.dropdown-menu.open').forEach(m=>m.classList.remove('open'));
});

/* ────────────────────────────────────── AUTH UI */
window.switchAuthTab=function(mode){
  authMode=mode;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(mode==='login'?0:1)));
  document.getElementById('field-prenom').style.display = mode==='register'?'':'none';
  document.querySelector('#auth-wrap button:last-of-type').textContent = mode==='login'?'Se connecter':'Créer mon compte';
  document.getElementById('auth-err').style.display='none';
};

window.handleAuth=async function(){
  const email=document.getElementById('inp-email').value.trim();
  const pwd=document.getElementById('inp-pwd').value;
  const errEl=document.getElementById('auth-err');
  errEl.style.display='none';
  try{
    if(authMode==='login'){
      await signInWithEmailAndPassword(auth,email,pwd);
    }else{
      const prenom=document.getElementById('inp-prenom').value.trim();
      if(!prenom){errEl.textContent='Entrez votre prénom.';errEl.style.display='block';return}
      const cred=await createUserWithEmailAndPassword(auth,email,pwd);
      await updateProfile(cred.user,{displayName:prenom});
    }
  }catch(err){
    const msgs={'auth/user-not-found':'Aucun compte avec cet email.','auth/wrong-password':'Mot de passe incorrect.',
      'auth/email-already-in-use':'Email déjà utilisé.','auth/weak-password':'Mot de passe trop faible (6 car. min).',
      'auth/invalid-email':'Email invalide.','auth/invalid-credential':'Email ou mot de passe incorrect.'};
    errEl.textContent=msgs[err.code]||err.message; errEl.style.display='block';
  }
};

/* ────────────────────────────────────── AUTH STATE */
onAuthStateChanged(auth, user=>{
  if(user){
    uid=user.uid;
    document.getElementById('auth-wrap').style.display='none';
    document.getElementById('app').style.display='flex';
    updateProfilUI();
    subscribeAll();
    goPage('catalogue');
  }else{
    uid=null;
    document.getElementById('auth-wrap').style.display='flex';
    document.getElementById('app').style.display='none';
    unsubAll();
  }
});

/* ────────────────────────────────────── SUBSCRIPTIONS */
function subscribeAll(){
  // Catalogue
  unsubCat=onSnapshot(query(col('users',uid,'catalogue'),orderBy('categorie'),orderBy('nom')),snap=>{
    catalogue=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCatalogue();
  });
  // Listes
  unsubListes=onSnapshot(query(col('users',uid,'listes'),orderBy('createdAt','desc')),snap=>{
    listes=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderListes();
    if(currentListeId) renderDetailHeader();
  });
  // Dossiers
  unsubDossiers=onSnapshot(col('users',uid,'dossiers'),snap=>{
    dossiers=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderDossierSelects();
  });
}
function unsubAll(){
  [unsubCat,unsubListes,unsubDossiers,unsubArticles].forEach(u=>u&&u());
}
function subscribeArticles(listeId){
  if(unsubArticles) unsubArticles();
  unsubArticles=onSnapshot(
    query(col('users',uid,'listes',listeId,'articles'),orderBy('categorie'),orderBy('nom')),
    snap=>{
      articles=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderDetailArticles();
      renderDetailCat();
    }
  );
}

/* ────────────────────────────────────── NAVIGATION */
window.goPage=function(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.inner-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page)?.classList.add('active');
  currentPage=page;
};

/* ────────────────────────────────────── CATALOGUE */
window.ajouterProduitCatalogue=async function(){
  const nom=document.getElementById('cat-nom').value.trim();
  const cat=document.getElementById('cat-cat').value;
  if(!nom) return;
  const existe=catalogue.some(p=>p.nom.toLowerCase()===nom.toLowerCase());
  if(existe){toast('⚠️ Ce produit existe déjà');return}
  await addDoc(col('users',uid,'catalogue'),{nom,categorie:cat,createdAt:serverTimestamp()});
  document.getElementById('cat-nom').value='';
  toast('✅ Produit ajouté');
};

window.supprimerProduit=function(id,nom){
  confirm2(`Supprimer "${nom}" du catalogue ?`,'Ce produit sera supprimé définitivement.',async()=>{
    await deleteDoc(docRef('users',uid,'catalogue',id));
    toast('🗑️ Produit supprimé');
  });
};

window.toggleCatSelection=function(id){
  selectionCat.has(id)?selectionCat.delete(id):selectionCat.add(id);
  updateSelectionBar();
  renderCatalogue();
};

window.clearSelection=function(){
  selectionCat.clear(); updateSelectionBar(); renderCatalogue();
};

function updateSelectionBar(){
  const bar=document.getElementById('cat-selection-bar');
  bar.style.display=selectionCat.size>0?'block':'none';
  document.getElementById('cat-sel-count').textContent=`${selectionCat.size} sélectionné(s)`;
}

window.ouvrirModalAjoutListe=function(){
  const lEnCours=listes.filter(l=>l.statut==='en_cours');
  console.log('Listes en cours:', lEnCours.length, 'Selection:', [...selectionCat], 'Catalogue:', catalogue.length);
  if(lEnCours.length===0){
    toast('⚠️ Créez d\'abord une liste dans l\'onglet Mes listes');
    return;
  }
  if(lEnCours.length===1){
    ajouterSelectionAListe(lEnCours[0].id, lEnCours[0].nom);
    return;
  }
  const el=document.getElementById('modal-listes-choix');
  el.innerHTML=lEnCours.map(l=>`<button class="btn btn-ghost" style="justify-content:flex-start;text-align:left" onclick="ajouterSelectionAListe('${l.id}','${l.nom.replace(/'/g,"\'")}')">&#128722; ${l.nom}</button>`).join('');
  openModal('modal-add-liste');
};

window.ajouterSelectionAListe=async function(listeId,listNom){
  closeModal('modal-add-liste');
  const selProduits=catalogue.filter(p=>selectionCat.has(p.id));
  console.log('Ajout dans liste:', listeId, listNom, 'Produits:', selProduits.map(p=>p.nom));
  if(!selProduits.length){toast('⚠️ Aucun produit sélectionné');return;}
  let ajoutes=0;
  try{
    const snap=await getDocs(col('users',uid,'listes',listeId,'articles'));
    const existants=snap.docs.map(d=>d.data().nom.toLowerCase());
    for(const p of selProduits){
      if(!existants.includes(p.nom.toLowerCase())){
        await addDoc(col('users',uid,'listes',listeId,'articles'),{
          nom:p.nom,categorie:p.categorie,quantite:1,unite:'',coche:false,createdAt:serverTimestamp()
        });
        ajoutes++;
        console.log('Ajouté OK:', p.nom);
      }
    }
    selectionCat.clear(); updateSelectionBar(); renderCatalogue();
    toast('✅ '+ajoutes+' produit(s) ajouté(s) à "'+listNom+'"');
  }catch(err){
    console.error('Erreur Firestore:', err);
    toast('❌ Erreur: '+err.message);
  }
};

function renderCatalogue(){
  const search=document.getElementById('cat-search')?.value.toLowerCase()||'';
  const filtered=catalogue.filter(p=>p.nom.toLowerCase().includes(search));
  const grouped={}; CATS.forEach(c=>grouped[c.id]=[]);
  filtered.forEach(p=>{ (grouped[p.categorie]||(grouped['autre'])).push(p); });
  let html=''; let total=0;
  const listesEC=listes.filter(l=>l.statut==='en_cours');
  CATS.forEach(cat=>{
    const items=grouped[cat.id]||[];
    if(!items.length) return;
    total+=items.length;
    html+=`<div class="cat-header"><span>${cat.label}</span></div>`;
    items.forEach(p=>{
      const sel=selectionCat.has(p.id);
      const nomE=p.nom.replace(/'/g,"\\'");
      let btnPlus='';
      if(listesEC.length===1){
        btnPlus=`<button class="btn btn-primary btn-sm" style="flex:none;font-size:.78rem;padding:.28rem .65rem" onclick="ajouterRapide(event,'${p.id}','${nomE}','${p.categorie}')">+ Liste</button>`;
      }else if(listesEC.length>1){
        btnPlus=`<button class="btn btn-primary btn-sm" style="flex:none;font-size:.78rem;padding:.28rem .65rem" onclick="choisirListe(event,'${p.id}','${nomE}','${p.categorie}')">+ Liste</button>`;
      }
      html+=`<div class="check-row" style="gap:.5rem">
        <div class="chk ${sel?'on':''}" onclick="toggleCatSelection('${p.id}')" title="Selectionner plusieurs">
          <svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M2 7L5 10L11 3"/></svg>
        </div>
        <span class="chk-label" style="flex:1">${p.nom}</span>
        ${btnPlus}
        <button class="btn btn-danger btn-icon btn-sm" onclick="supprimerProduit('${p.id}','${nomE}')">&#128465;</button>
      </div>`;
    });
  });
  if(total===0) html='<div class="empty"><div class="empty-icon">&#128722;</div><p>Votre catalogue est vide.<br>Ajoutez vos produits habituels !</p></div>';
  document.getElementById('cat-list').innerHTML=html;
}

window.ajouterRapide=async function(e,produitId,nom,cat){
  e.stopPropagation();
  const listesEC=listes.filter(l=>l.statut==='en_cours');
  if(!listesEC.length){toast('⚠️ Créez d\'abord une liste dans Mes listes');return;}
  const listeId=listesEC[0].id;
  const snap=await getDocs(col('users',uid,'listes',listeId,'articles'));
  const existants=snap.docs.map(d=>d.data().nom.toLowerCase());
  if(existants.includes(nom.toLowerCase())){toast('⚠️ Déjà dans la liste');return;}
  await addDoc(col('users',uid,'listes',listeId,'articles'),{nom,categorie:cat,quantite:1,unite:'',coche:false,createdAt:serverTimestamp()});
  toast('✅ "'+nom+'" ajouté à la liste !');
};

window.choisirListe=function(e,produitId,nom,cat){
  e.stopPropagation();
  const listesEC=listes.filter(l=>l.statut==='en_cours');
  const el=document.getElementById('modal-listes-choix');
  el.innerHTML=listesEC.map(l=>`<button class="btn btn-ghost" style="justify-content:flex-start" onclick="ajouterProduitDirect('${l.id}','${l.nom.replace(/'/g,"\\'")}','${nom.replace(/'/g,"\\'")}','${cat}')">&#128722; ${l.nom}</button>`).join('');
  openModal('modal-add-liste');
};

window.ajouterProduitDirect=async function(listeId,listNom,nom,cat){
  closeModal('modal-add-liste');
  const snap=await getDocs(col('users',uid,'listes',listeId,'articles'));
  const existants=snap.docs.map(d=>d.data().nom.toLowerCase());
  if(existants.includes(nom.toLowerCase())){toast('⚠️ Déjà dans cette liste');return;}
  await addDoc(col('users',uid,'listes',listeId,'articles'),{nom,categorie:cat,quantite:1,unite:'',coche:false,createdAt:serverTimestamp()});
  toast('✅ "'+nom+'" ajouté à "'+listNom+'" !');
};

/* ────────────────────────────────────── LISTES */
window.creerListe=async function(){
  const nom=document.getElementById('inp-liste-nom').value.trim();
  const dossier=document.getElementById('inp-liste-dossier').value;
  if(!nom) return;
  const ref=await addDoc(col('users',uid,'listes'),{nom,dossier,statut:'en_cours',createdAt:serverTimestamp()});
  document.getElementById('inp-liste-nom').value='';
  toast('✅ Liste créée');
  ouvrirDetail(ref.id);
};

window.ouvrirDetail=function(listeId){
  currentListeId=listeId;
  articles=[];
  document.querySelectorAll('.page,.inner-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.getElementById('detail-cat-panel').style.display='none';
  renderDetailHeader();
  subscribeArticles(listeId);
};

window.retourListes=function(){
  if(unsubArticles){unsubArticles();unsubArticles=null;}
  currentListeId=null; articles=[];
  goPage('listes');
};

window.validerListe=async function(listeId,actuel){
  if(actuel==='terminee'){
    await updateDoc(docRef('users',uid,'listes',listeId),{statut:'en_cours'});
    toast('🔄 Liste réouverte');
  }else{
    await updateDoc(docRef('users',uid,'listes',listeId),{statut:'terminee',termineeLe:serverTimestamp()});
    toast('✅ Courses terminées !');
  }
};

window.dupliquerListe=async function(listeId){
  const liste=listes.find(l=>l.id===listeId);
  if(!liste) return;
  toast('⏳ Duplication…');
  const snap=await getDocs(col('users',uid,'listes',listeId,'articles'));
  const newRef=await addDoc(col('users',uid,'listes'),{
    nom:liste.nom+' (copie)',dossier:liste.dossier||'',statut:'en_cours',createdAt:serverTimestamp()
  });
  for(const d of snap.docs){
    const a=d.data();
    await addDoc(col('users',uid,'listes',newRef.id,'articles'),{
      nom:a.nom,categorie:a.categorie,quantite:a.quantite||1,unite:a.unite||'',coche:false,createdAt:serverTimestamp()
    });
  }
  toast('✅ Liste dupliquée !');
};

window.supprimerListe=function(listeId,nom){
  confirm2(`Supprimer "${nom}" ?`,'Cette liste et tous ses articles seront supprimés définitivement.',async()=>{
    const snap=await getDocs(col('users',uid,'listes',listeId,'articles'));
    for(const d of snap.docs) await deleteDoc(d.ref);
    await deleteDoc(docRef('users',uid,'listes',listeId));
    toast('🗑️ Liste supprimée');
  });
};

window.ouvrirModalDeplacer=function(listeId){
  const el=document.getElementById('modal-dossiers-choix');
  el.innerHTML=`<button class="btn btn-ghost" style="justify-content:flex-start" onclick="deplacerListe('${listeId}','')">📋 Sans dossier</button>`
    +dossiers.map(d=>`<button class="btn btn-ghost" style="justify-content:flex-start" onclick="deplacerListe('${listeId}','${d.nom.replace(/'/g,"\\'")}')">📁 ${d.nom}</button>`).join('');
  openModal('modal-deplacer');
};

window.deplacerListe=async function(listeId,dossier){
  await updateDoc(docRef('users',uid,'listes',listeId),{dossier});
  closeModal('modal-deplacer'); toast('📁 Liste déplacée');
};

window.renommerListe=async function(listeId,ancienNom){
  const nouveau=prompt('Nouveau nom :',ancienNom);
  if(!nouveau||!nouveau.trim()) return;
  await updateDoc(docRef('users',uid,'listes',listeId),{nom:nouveau.trim()});
  toast('✏️ Liste renommée');
};

function renderListes(){
  const filterStatut=document.getElementById('filter-statut')?.value||'';
  const filterDossier=document.getElementById('filter-dossier')?.value;
  let filtered=listes;
  if(filterStatut) filtered=filtered.filter(l=>l.statut===filterStatut);
  if(filterDossier!==undefined&&filterDossier!=='') filtered=filtered.filter(l=>l.dossier===filterDossier);
  const el=document.getElementById('listes-list');
  if(!el) return;
  if(filtered.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">🛍️</div><p>Aucune liste pour le moment.<br>Créez votre première liste !</p></div>';
    return;
  }
  // Grouper par dossier
  const grouped={'':[]};
  dossiers.forEach(d=>grouped[d.nom]=[]);
  filtered.forEach(l=>{ if(grouped[l.dossier]!==undefined) grouped[l.dossier].push(l); else grouped[''].push(l); });
  let html='';
  Object.entries(grouped).forEach(([doss,items])=>{
    if(!items.length) return;
    if(Object.keys(grouped).length>1) html+=`<div class="cat-header"><span>${doss?'📁 '+doss:'📋 Mes listes'}</span></div>`;
    items.forEach(l=>{
      const date=l.createdAt?.toDate?l.createdAt.toDate().toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';
      const statBadge=l.statut==='terminee'?'<span class="badge badge-green">✓ Terminée</span>':'<span class="badge badge-orange">En cours</span>';
      html+=`<div class="liste-card ${l.statut==='terminee'?'done':''}" onclick="ouvrirDetail('${l.id}')">
        <div class="liste-card-header">
          <div style="flex:1;min-width:0">
            <div class="liste-nom">${l.nom} ${statBadge}</div>
            <div class="liste-meta">${l.dossier?'📁 '+l.dossier+' · ':''}📅 ${date}</div>
          </div>
          <div class="dropdown" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-icon" onclick="this.nextElementSibling.classList.toggle('open')">⋮</button>
            <div class="dropdown-menu">
              <button class="dropdown-item" onclick="renommerListe('${l.id}','${l.nom.replace(/'/g,"\\'")}')">✏️ Renommer</button>
              <button class="dropdown-item" onclick="dupliquerListe('${l.id}')">📋 Dupliquer</button>
              <button class="dropdown-item" onclick="ouvrirModalDeplacer('${l.id}')">📁 Déplacer</button>
              <button class="dropdown-item" onclick="validerListe('${l.id}','${l.statut}')">${l.statut==='terminee'?'🔄 Réouvrir':'✅ Terminer'}</button>
              <button class="dropdown-item danger" onclick="supprimerListe('${l.id}','${l.nom.replace(/'/g,"\\'")}')">🗑️ Supprimer</button>
            </div>
          </div>
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

/* ────────────────────────────────────── DOSSIERS */
window.toggleCreerDossier=function(){
  const f=document.getElementById('creer-dossier-form');
  f.style.display=f.style.display==='none'?'block':'none';
  renderDossierList();
};

function renderDossierList(){
  const el=document.getElementById('dossiers-list');
  if(!el) return;
  el.innerHTML=dossiers.map(d=>`<div style="display:flex;align-items:center;gap:.3rem;background:var(--s3);border-radius:20px;padding:.2rem .7rem .2rem .9rem;font-size:.82rem">
    📁 ${d.nom}
    <button style="color:var(--red);cursor:pointer;font-size:.9rem;background:none;border:none" onclick="supprimerDossier('${d.id}','${d.nom.replace(/'/g,"\\'")}')">✕</button>
  </div>`).join('');
}

window.creerDossier=async function(){
  const nom=document.getElementById('inp-dossier').value.trim();
  if(!nom) return;
  await addDoc(col('users',uid,'dossiers'),{nom,createdAt:serverTimestamp()});
  document.getElementById('inp-dossier').value='';
  renderDossierList();
  toast('📁 Dossier créé');
};

window.supprimerDossier=function(id,nom){
  confirm2(`Supprimer le dossier "${nom}" ?`,'Les listes resteront sans dossier.',async()=>{
    await deleteDoc(docRef('users',uid,'dossiers',id));
    toast('🗑️ Dossier supprimé');
  });
};

function renderDossierSelects(){
  const optsDossier=`<option value="">Sans dossier</option>`+dossiers.map(d=>`<option value="${d.nom}">${d.nom}</option>`).join('');
  const sel=document.getElementById('inp-liste-dossier');
  if(sel) sel.innerHTML=optsDossier;
  // Filter dossier
  const fsel=document.getElementById('filter-dossier');
  if(fsel) fsel.innerHTML=`<option value="">Tous les dossiers</option>`+dossiers.map(d=>`<option value="${d.nom}">📁 ${d.nom}</option>`).join('');
  renderDossierList();
}

/* ────────────────────────────────────── DETAIL (liste ouverte) */
function renderDetailHeader(){
  const liste=listes.find(l=>l.id===currentListeId);
  if(!liste) return;
  const total=articles.length, coches=articles.filter(a=>a.coche).length;
  const pct=total?Math.round(coches/total*100):0;
  const addSec=document.getElementById('detail-add-section');
  if(addSec) addSec.style.display=liste.statut==='terminee'?'none':'block';
  document.getElementById('detail-header').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.8rem">
      <div>
        <h2 style="font-family:var(--ff);font-size:1.3rem;font-weight:800">${liste.nom}</h2>
        ${liste.dossier?`<div style="font-size:.75rem;color:var(--t3)">📁 ${liste.dossier}</div>`:''}
      </div>
      <button class="btn btn-sm ${liste.statut==='terminee'?'btn-ghost':'btn-success'}" onclick="validerListe('${liste.id}','${liste.statut}')">
        ${liste.statut==='terminee'?'🔄 Réouvrir':'✅ Terminer'}
      </button>
    </div>
    ${total>0?`
    <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--t3);margin-bottom:.25rem">
      <span>${coches}/${total} articles</span><span>${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="margin-bottom:.8rem"></div>`:''}
  `;
}

window.toggleDetailCat=function(){
  const p=document.getElementById('detail-cat-panel');
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display!=='none') renderDetailCat();
};

window.renderDetailCat=function(){
  const search=document.getElementById('detail-cat-search')?.value.toLowerCase()||'';
  const nonAjoutes=catalogue.filter(p=>
    !articles.find(a=>a.nom.toLowerCase()===p.nom.toLowerCase())&&
    p.nom.toLowerCase().includes(search)
  );
  const grouped={}; CATS.forEach(c=>grouped[c.id]=[]);
  nonAjoutes.forEach(p=>{ (grouped[p.categorie]||(grouped['autre'])).push(p); });
  let html='';
  CATS.forEach(cat=>{
    const items=grouped[cat.id]||[];
    if(!items.length) return;
    html+=`<div class="cat-header"><span>${cat.label}</span></div>`;
    items.forEach(p=>html+=`<div class="check-row" onclick="ajouterDepuisCatalogue('${p.id}','${p.nom.replace(/'/g,"\\'")}','${p.categorie}')">
      <div class="chk"><svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M2 7L5 10L11 3"/></svg></div>
      <span class="chk-label">${p.nom}</span>
      <span style="font-size:.75rem;color:var(--accent)">+ Ajouter</span>
    </div>`);
  });
  if(!html) html='<p style="color:var(--t3);font-size:.85rem;padding:.5rem 0">Aucun produit trouvé.</p>';
  document.getElementById('detail-cat-list').innerHTML=html;
};

window.ajouterDepuisCatalogue=async function(id,nom,cat){
  if(articles.find(a=>a.nom.toLowerCase()===nom.toLowerCase())){toast('⚠️ Déjà dans la liste');return}
  await addDoc(col('users',uid,'listes',currentListeId,'articles'),{nom,categorie:cat,quantite:1,unite:'',coche:false,createdAt:serverTimestamp()});
  toast('✅ Ajouté');
};

window.ajouterManuel=async function(){
  const nom=document.getElementById('detail-man-nom').value.trim();
  const cat=document.getElementById('detail-man-cat').value;
  if(!nom) return;
  await addDoc(col('users',uid,'listes',currentListeId,'articles'),{nom,categorie:cat,quantite:1,unite:'',coche:false,createdAt:serverTimestamp()});
  document.getElementById('detail-man-nom').value='';
  toast('✅ Ajouté');
};

window.cocherArticle=async function(id,val){
  await updateDoc(docRef('users',uid,'listes',currentListeId,'articles',id),{coche:val});
};

window.supprimerArticle=function(id,nom){
  confirm2(`Retirer "${nom}" ?`,'Cet article sera retiré de cette liste.',async()=>{
    await deleteDoc(docRef('users',uid,'listes',currentListeId,'articles',id));
  });
};

window.modifierQty=async function(id,delta){
  const art=articles.find(a=>a.id===id); if(!art) return;
  const newQty=Math.max(0.5,(art.quantite||1)+delta);
  await updateDoc(docRef('users',uid,'listes',currentListeId,'articles',id),{quantite:newQty});
};

window.changerUnite=async function(id,val){
  await updateDoc(docRef('users',uid,'listes',currentListeId,'articles',id),{unite:val});
};

function renderDetailArticles(){
  renderDetailHeader();
  const liste=listes.find(l=>l.id===currentListeId);
  const termine=liste?.statut==='terminee';
  const grouped={}; CATS.forEach(c=>grouped[c.id]=[]);
  articles.forEach(a=>{ (grouped[a.categorie]||(grouped['autre'])).push(a); });
  let html='';
  CATS.forEach(cat=>{
    const items=grouped[cat.id]||[];
    if(!items.length) return;
    html+=`<div class="cat-header"><span>${cat.label}</span></div>`;
    items.forEach(a=>{
      const uniteOpts=UNITES.map(u=>`<option value="${u}" ${a.unite===u?'selected':''}>${u||'—'}</option>`).join('');
      html+=`<div class="card" style="margin-bottom:.5rem;padding:.75rem">
        <div style="display:flex;align-items:center;gap:.75rem">
          <div class="chk ${a.coche?'on':''}" onclick="${termine?'':'cocherArticle(\''+a.id+'\','+(a.coche?'false':'true')+')'}" style="cursor:${termine?'default':'pointer'}">
            <svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M2 7L5 10L11 3"/></svg>
          </div>
          <div style="flex:1;min-width:0">
            <div class="chk-label ${a.coche?'done':''}">${a.nom}</div>
            ${!termine?`<div style="display:flex;align-items:center;gap:.4rem;margin-top:.3rem">
              <div class="qty-wrap">
                <button class="qty-btn" onclick="modifierQty('${a.id}',-1)">−</button>
                <span style="min-width:28px;text-align:center;font-size:.88rem">${a.quantite||1}</span>
                <button class="qty-btn" onclick="modifierQty('${a.id}',1)">+</button>
              </div>
              <select style="width:auto;padding:.25rem .4rem;font-size:.78rem" onchange="changerUnite('${a.id}',this.value)">${uniteOpts}</select>
            </div>`:`<span style="font-size:.78rem;color:var(--t3)">${a.quantite||1} ${a.unite||''}</span>`}
          </div>
          ${!termine?`<button class="btn btn-danger btn-icon btn-sm" onclick="supprimerArticle('${a.id}','${a.nom.replace(/'/g,"\\'")}')">🗑️</button>`:''}
        </div>
      </div>`;
    });
  });
  if(!articles.length) html='<div class="empty"><div class="empty-icon">🛍️</div><p>Liste vide.<br>Ajoutez des produits depuis le catalogue !</p></div>';
  document.getElementById('detail-articles').innerHTML=html;
}

/* ────────────────────────────────────── PROFIL */
function updateProfilUI(){
  const user=auth.currentUser; if(!user) return;
  const prenom=user.displayName||user.email||'U';
  const initiales=prenom.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('profil-avatar').textContent=initiales;
  document.getElementById('profil-nom').textContent=user.displayName||'Utilisateur';
  document.getElementById('profil-email').textContent=user.email;
  document.getElementById('inp-new-nom').value=user.displayName||'';
}

window.updateNom=async function(){
  const nom=document.getElementById('inp-new-nom').value.trim();
  if(!nom) return;
  await updateProfile(auth.currentUser,{displayName:nom});
  updateProfilUI(); toast('✅ Prénom mis à jour');
};

window.updatePwd=async function(){
  const cur=document.getElementById('inp-pwd-cur').value;
  const nw=document.getElementById('inp-pwd-new').value;
  if(!cur||!nw){toast('⚠️ Remplissez les deux champs');return}
  if(nw.length<6){toast('⚠️ 6 caractères minimum');return}
  try{
    const cred=EmailAuthProvider.credential(auth.currentUser.email,cur);
    await reauthenticateWithCredential(auth.currentUser,cred);
    await updatePassword(auth.currentUser,nw);
    document.getElementById('inp-pwd-cur').value='';
    document.getElementById('inp-pwd-new').value='';
    toast('✅ Mot de passe modifié');
  }catch(e){toast('❌ Mot de passe actuel incorrect');}
};

window.deconnexion=async function(){
  await signOut(auth); toast('👋 Déconnecté');
};

/* ────────────────────────────────────── CONFIRM DIALOG */
function confirm2(title,msg,onOk){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  const btn=document.getElementById('confirm-ok');
  const newBtn=btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn,btn);
  newBtn.onclick=()=>{ closeModal('modal-confirm'); onOk(); };
  openModal('modal-confirm');
}

/* ────────────────────────────────────── ENTER KEY su auth */
document.getElementById('inp-pwd').addEventListener('keydown',e=>{if(e.key==='Enter') handleAuth()});
</script>
