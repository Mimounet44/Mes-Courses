<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#f5f7fa"/>
<title>Mes Courses 🛒</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════ VARIABLES & RESET */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;
  --card:#ffffff;
  --card2:#f0f3f8;
  --border:#e2e8f2;
  --border2:#cdd5e0;
  --accent:#3b7ff5;
  --accent-light:#eef3fe;
  --accent-dark:#2563cc;
  --green:#16a34a;
  --green-light:#dcfce7;
  --red:#dc2626;
  --red-light:#fee2e2;
  --orange:#ea580c;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --nav-h:64px;
  --r:14px;
  --rs:8px;
  --ff:'Nunito',sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:var(--ff);font-size:1rem;transition:all .16s;-webkit-tap-highlight-color:transparent}
input,select{font-family:var(--ff);font-size:.95rem;color:var(--text);background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:.6rem .85rem;outline:none;transition:border-color .18s,box-shadow .18s;width:100%}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,127,245,.12)}
input::placeholder{color:var(--text3)}
select option{background:#fff;color:var(--text)}

/* ════════════════════════════ LAYOUT */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.2rem;background:linear-gradient(160deg,#eef3fe 0%,#f5f7fa 50%,#fef9ec 100%)}
#app-screen{display:none;flex-direction:column;min-height:100vh}
.page{display:none;padding:1.2rem 1rem calc(var(--nav-h)+1.2rem);max-width:620px;margin:0 auto;width:100%;animation:fadeUp .25s ease both}
.page.show{display:block}
.subpage{display:none;padding:1.2rem 1rem calc(var(--nav-h)+1.2rem);max-width:620px;margin:0 auto;width:100%;animation:fadeUp .25s ease both}
.subpage.show{display:block}

/* ════════════════════════════ AUTH */
.auth-card{background:var(--card);border-radius:20px;padding:2rem 1.5rem;width:100%;max-width:380px;box-shadow:var(--shadow-lg)}
.auth-logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#3b7ff5,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 1.2rem;box-shadow:0 6px 24px rgba(59,127,245,.35)}
.auth-title{text-align:center;font-size:1.8rem;font-weight:900;color:var(--text);margin-bottom:.3rem}
.auth-sub{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:1.6rem}
.tabs{display:flex;background:var(--card2);border-radius:var(--rs);padding:4px;gap:4px;margin-bottom:1.2rem}
.tab{flex:1;padding:.5rem;border-radius:6px;font-weight:700;font-size:.85rem;color:var(--text2);transition:all .2s}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,127,245,.3)}
.form-group{margin-bottom:.85rem}
.form-label{display:block;font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.04em}
.auth-error{background:var(--red-light);color:var(--red);border-radius:var(--rs);padding:.65rem .9rem;font-size:.83rem;font-weight:600;margin-bottom:.9rem;display:none}

/* ════════════════════════════ BOUTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;padding:.6rem 1.1rem;border-radius:var(--rs);font-weight:700;font-size:.88rem;white-space:nowrap;transition:all .16s;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,127,245,.3)}
.btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,127,245,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{color:var(--text2);background:transparent}
.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-danger:hover{background:#fca5a5;color:var(--red)}
.btn-success{background:var(--green-light);color:var(--green)}
.btn-success:hover{background:#bbf7d0}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-sm{padding:.32rem .65rem;font-size:.78rem;border-radius:6px}
.btn-full{width:100%;padding:.75rem}

/* ════════════════════════════ CARDS */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:1.1rem;box-shadow:var(--shadow)}
.card+.card{margin-top:.6rem}

/* ════════════════════════════ NAV BAS */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:.22rem;padding:.4rem 1.4rem;border-radius:10px;color:var(--text3);font-size:.67rem;font-weight:700;letter-spacing:.03em;transition:all .18s}
.nav-btn.on{color:var(--accent)}
.nav-btn svg{width:24px;height:24px;stroke-width:1.8;transition:stroke-width .18s}
.nav-btn.on svg{stroke-width:2.5}

/* ════════════════════════════ PAGE HEADERS */
.page-title{font-size:1.4rem;font-weight:900;color:var(--text);display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem}
.back-row{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.back-btn{display:flex;align-items:center;gap:.3rem;color:var(--text2);font-size:.85rem;font-weight:700;padding:.2rem 0}
.back-btn:hover{color:var(--accent)}
.back-btn svg{width:18px;height:18px}

/* ════════════════════════════ CATÉGORIE HEADER */
.cat-group{margin-bottom:.2rem}
.cat-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);padding:.9rem .2rem .35rem;display:flex;align-items:center;gap:.5rem}
.cat-title::after{content:'';flex:1;height:1.5px;background:var(--border)}

/* ════════════════════════════ PRODUIT ROW */
.prod-row{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:var(--rs);transition:background .14s;cursor:default}
.prod-row:hover{background:var(--card2)}
.prod-nom{flex:1;font-size:.93rem;font-weight:600;color:var(--text)}

/* ════════════════════════════ CHECKBOX */
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;cursor:pointer}
.chk.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,127,245,.15)}
.chk svg{opacity:0;transition:opacity .15s;width:13px;height:13px}
.chk.on svg{opacity:1}
.chk-label{flex:1;font-size:.93rem;font-weight:600}
.chk-label.done{text-decoration:line-through;color:var(--text3);font-weight:400}

/* ════════════════════════════ BARRE SÉLECTION */
.sel-bar{background:var(--accent);color:#fff;border-radius:var(--r);padding:.8rem 1rem;display:none;align-items:center;justify-content:space-between;gap:.8rem;margin-bottom:.8rem;box-shadow:0 4px 16px rgba(59,127,245,.3)}
.sel-bar.show{display:flex}
.sel-count{font-weight:800;font-size:.9rem}

/* ════════════════════════════ ARTICLE CARD */
.article-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:.8rem .9rem;margin-bottom:.5rem;transition:border-color .18s,opacity .18s}
.article-card.done{opacity:.6;border-color:var(--border)}
.article-card.done .chk-label{text-decoration:line-through;color:var(--text3);font-weight:400}
.article-top{display:flex;align-items:center;gap:.65rem}
.article-qty{display:flex;align-items:center;gap:.4rem;margin-top:.4rem;padding-left:2.1rem}
.qty-btn{width:28px;height:28px;border-radius:6px;background:var(--card2);border:1.5px solid var(--border);color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.qty-btn:hover{background:var(--border);border-color:var(--border2)}
.qty-val{min-width:32px;text-align:center;font-weight:700;font-size:.9rem;color:var(--text)}
.qty-unite{background:var(--card2);border:1.5px solid var(--border);border-radius:6px;padding:.25rem .5rem;font-size:.78rem;color:var(--text2);width:auto;cursor:pointer}

/* ════════════════════════════ LISTE CARD */
.liste-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.65rem;cursor:pointer;transition:all .18s;box-shadow:var(--shadow)}
.liste-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(59,127,245,.12);transform:translateY(-1px)}
.liste-card.terminee{border-color:var(--green);background:linear-gradient(135deg,#fff 0%,#f0fdf4 100%)}
.liste-nom{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:.25rem}
.liste-meta{font-size:.76rem;color:var(--text3);display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:.2rem;padding:.15rem .55rem;border-radius:20px;font-size:.7rem;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-blue{background:var(--accent-light);color:var(--accent)}

/* ════════════════════════════ PROGRESS */
.progress{height:4px;background:var(--card2);border-radius:2px;overflow:hidden;margin:.5rem 0 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s ease}

/* ════════════════════════════ MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:.8rem;animation:fadeIn .2s ease}
@media(min-width:480px){.overlay{align-items:center}}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px 20px 20px 20px;padding:1.5rem;width:100%;max-width:400px;animation:slideUp .25s ease;box-shadow:var(--shadow-lg)}
.modal-title{font-size:1.05rem;font-weight:900;margin-bottom:.3rem}
.modal-sub{font-size:.85rem;color:var(--text2);margin-bottom:1.1rem;line-height:1.5}
.modal-actions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.2rem}

/* ════════════════════════════ TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + .8rem);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:30px;padding:.55rem 1.3rem;font-size:.84rem;font-weight:700;z-index:400;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center;display:none;animation:slideUp .22s ease}

/* ════════════════════════════ EMPTY */
.empty{text-align:center;padding:3.5rem 1rem;color:var(--text2)}
.empty-icon{font-size:3.5rem;margin-bottom:.8rem;opacity:.35}
.empty p{font-size:.88rem;line-height:1.7;color:var(--text3)}

/* ════════════════════════════ PROFIL */
.avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#60a5fa);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;color:#fff;box-shadow:0 4px 16px rgba(59,127,245,.3)}

/* ════════════════════════════ DROPDOWN */
.ddmenu{position:absolute;right:0;top:calc(100% + 4px);background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);min-width:170px;box-shadow:var(--shadow-lg);z-index:50;overflow:hidden;display:none;animation:fadeIn .15s ease}
.ddmenu.show{display:block}
.dditem{display:block;width:100%;text-align:left;padding:.65rem 1rem;font-size:.85rem;font-weight:600;color:var(--text);background:none;border:none;font-family:var(--ff);cursor:pointer;transition:background .12s}
.dditem:hover{background:var(--card2)}
.dditem.danger{color:var(--red)}

/* ════════════════════════════ FORM ROW */
.frow{display:flex;gap:.5rem;align-items:flex-end;flex-wrap:wrap}
.frow>input,.frow>select{flex:1;min-width:0}

/* ════════════════════════════ SECTION ADD */
.add-section{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:.9rem;box-shadow:var(--shadow)}
.add-toggle{display:flex;align-items:center;justify-content:center;gap:.4rem;width:100%;padding:.8rem;font-weight:700;font-size:.88rem;color:var(--accent);transition:background .14s}
.add-toggle:hover{background:var(--accent-light)}
.add-body{padding:0 1rem 1rem;display:none}
.add-body.show{display:block}
.add-sep{height:1.5px;background:var(--border);margin:.8rem 0}

/* ════════════════════════════ PRINT */
@media print{
  .bottom-nav,.back-row,.add-section,.btn,.overlay,.toast{display:none!important}
  body{background:#fff!important;color:#000!important}
  .subpage{display:block!important;padding:0!important}
  .page{display:none!important}
  #page-detail{display:block!important}
  .article-card{border:1px solid #ccc!important;box-shadow:none!important;break-inside:avoid}
  .article-qty{display:none!important}
  @page{margin:1.5cm}
}

/* ════════════════════════════ ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ══════════════ ÉCRAN AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">🛒</div>
    <h1 class="auth-title">Mes Courses</h1>
    <p class="auth-sub">Gérez vos courses en famille</p>
    <div class="tabs">
      <button class="tab on" onclick="setTab('login')">Connexion</button>
      <button class="tab" onclick="setTab('register')">Inscription</button>
    </div>
    <div id="auth-err" class="auth-error"></div>
    <div id="f-prenom" class="form-group" style="display:none">
      <label class="form-label">Prénom</label>
      <input id="i-prenom" placeholder="Ex : Marie" autocomplete="given-name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="i-email" type="email" placeholder="email@exemple.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input id="i-pwd" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary btn-full" id="auth-btn" onclick="doAuth()">Se connecter</button>
  </div>
</div>

<!-- ══════════════ APP -->
<div id="app-screen">

  <!-- PAGE CATALOGUE -->
  <div id="page-catalogue" class="page show">
    <div class="page-title">📋 Catalogue</div>

    <!-- Ajout produit -->
    <div class="card" style="margin-bottom:.9rem">
      <div class="frow">
        <input id="c-nom" placeholder="Nom du produit…" style="flex:2" onkeydown="if(event.key==='Enter')addProduit()"/>
        <select id="c-cat" style="flex:1;min-width:130px">
          <option value="legumes">🥦 Légumes</option>
          <option value="fruits">🍎 Fruits</option>
          <option value="viande">🥩 Viande</option>
          <option value="poisson">🐟 Poisson</option>
          <option value="laitage">🥛 Laitage & Œufs</option>
          <option value="epicerie">🥫 Épicerie</option>
          <option value="boulangerie">🥖 Boulangerie</option>
          <option value="surgeles">🧊 Surgelés</option>
          <option value="boissons">🥤 Boissons</option>
          <option value="hygiene">🧴 Hygiène</option>
          <option value="entretien">🧹 Entretien</option>
          <option value="autre">📦 Autre</option>
        </select>
        <button class="btn btn-primary" onclick="addProduit()" style="flex:none">+ Ajouter</button>
      </div>
    </div>

    <!-- Barre sélection -->
    <div class="sel-bar" id="sel-bar">
      <span class="sel-count" id="sel-count">0 sélectionné(s)</span>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="clearSel()">Annuler</button>
        <button class="btn btn-sm" style="background:#fff;color:var(--accent)" onclick="addSelToListe()">➕ Ajouter à la liste</button>
      </div>
    </div>

    <!-- Recherche -->
    <input id="c-search" placeholder="🔍 Rechercher un produit…" style="margin-bottom:.8rem" oninput="renderCat()"/>

    <!-- Liste produits -->
    <div id="cat-list"></div>
  </div>

  <!-- PAGE MES LISTES -->
  <div id="page-listes" class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="page-title" style="margin-bottom:0">🛍️ Mes listes</div>
      <button class="btn btn-outline btn-sm" onclick="toggleDossierForm()">📁 Dossier</button>
    </div>

    <!-- Créer dossier -->
    <div id="dossier-form" class="card" style="display:none;margin-bottom:.8rem">
      <div class="frow">
        <input id="i-dossier" placeholder="Nom du dossier…" onkeydown="if(event.key==='Enter')addDossier()"/>
        <button class="btn btn-primary" onclick="addDossier()" style="flex:none">Créer</button>
        <button class="btn btn-ghost" onclick="toggleDossierForm()" style="flex:none">✕</button>
      </div>
      <div id="dossiers-tags" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.7rem"></div>
    </div>

    <!-- Nouvelle liste -->
    <div class="card" style="margin-bottom:.9rem">
      <div class="frow">
        <input id="i-liste" placeholder="Nom de la liste…" onkeydown="if(event.key==='Enter')addListe()"/>
        <select id="i-liste-dossier" style="width:auto;flex:none">
          <option value="">Sans dossier</option>
        </select>
        <button class="btn btn-primary" onclick="addListe()" style="flex:none">+ Créer</button>
      </div>
    </div>

    <!-- Filtres -->
    <div style="display:flex;gap:.5rem;margin-bottom:.9rem;flex-wrap:wrap">
      <select id="f-statut" onchange="renderListes()" style="width:auto;flex:none;font-size:.82rem">
        <option value="">Toutes</option>
        <option value="en_cours">En cours</option>
        <option value="terminee">Terminées</option>
      </select>
      <select id="f-dossier" onchange="renderListes()" style="width:auto;flex:none;font-size:.82rem">
        <option value="">Tous les dossiers</option>
      </select>
    </div>

    <div id="listes-list"></div>
  </div>

  <!-- PAGE PROFIL -->
  <div id="page-profil" class="page">
    <div class="page-title">👤 Mon profil</div>
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
      <div class="avatar" id="p-avatar">?</div>
      <div>
        <div id="p-nom" style="font-weight:800;font-size:1.05rem"></div>
        <div id="p-email" style="color:var(--text2);font-size:.85rem"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:.7rem">
      <div style="font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.75rem">✏️ Modifier le prénom</div>
      <div class="frow">
        <input id="p-new-nom" placeholder="Nouveau prénom"/>
        <button class="btn btn-primary" onclick="updateNom()" style="flex:none">Sauvegarder</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:.7rem">
      <div style="font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.75rem">🔒 Changer le mot de passe</div>
      <div class="form-group"><label class="form-label">Mot de passe actuel</label><input id="p-pwd-cur" type="password" placeholder="••••••••"/></div>
      <div class="form-group"><label class="form-label">Nouveau mot de passe</label><input id="p-pwd-new" type="password" placeholder="6 caractères min."/></div>
      <button class="btn btn-primary btn-sm" onclick="updatePwd()">Modifier</button>
    </div>
    <button class="btn btn-danger btn-full" style="margin-top:.5rem" onclick="doLogout()">🚪 Se déconnecter</button>
  </div>

  <!-- SOUS-PAGE LISTE DÉTAIL -->
  <div id="page-detail" class="subpage">
    <div class="back-row">
      <button class="back-btn" onclick="closeDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Mes listes
      </button>
    </div>
    <div id="detail-header"></div>

    <!-- Section ajout -->
    <div class="add-section" id="add-section">

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,

import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         onSnapshot, serverTimestamp, getDocs, writeBatch }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

/* ══════ CONFIG FIREBASE — remplacez par vos valeurs ══════ */
const FB = {
  apiKey:            "AIzaSyDMHRowm0gRH09w6qzRf89SWtE_y89KcZY",
  authDomain:        "mes-courses-cf52d.firebaseapp.com",
  projectId:         "mes-courses-cf52d",
  storageBucket:     "mes-courses-cf52d.firebasestorage.app",
  messagingSenderId: "248641691402",
  appId:             "1:248641691402:web:f36ad91dc0045d1edf24f3"
};
/* ════════════════════════════════════════════════════════ */

const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ══════ CATÉGORIES ══════ */
const CATS = [
  {id:'legumes',     label:'🥦 Légumes'},
  {id:'fruits',      label:'🍎 Fruits'},
  {id:'viande',      label:'🥩 Viande'},
  {id:'poisson',     label:'🐟 Poisson'},
  {id:'laitage',     label:'🥛 Laitage & Œufs'},
  {id:'epicerie',    label:'🥫 Épicerie'},
  {id:'boulangerie', label:'🥖 Boulangerie'},
  {id:'surgeles',    label:'🧊 Surgelés'},
  {id:'boissons',    label:'🥤 Boissons'},
  {id:'hygiene',     label:'🧴 Hygiène'},
  {id:'entretien',   label:'🧹 Entretien'},
  {id:'autre',       label:'📦 Autre'},
];
const UNITES = ['','kg','g','L','cl','pièce(s)','boîte(s)','sachet(s)','bouteille(s)','paquet(s)'];
const catLabel = id => (CATS.find(c=>c.id===id)||CATS.at(-1)).label;

/* ══════ STATE ══════ */
let UID = null;
let authTab = 'login';
let activePage = 'catalogue';
let activeListeId = null;

// Données temps réel
let catalogue = [];
let listes     = [];
let dossiers   = [];
let articles   = [];

// Sélection catalogue
let sel = new Set();

// Unsubscribers
let unsCat=null, unsListes=null, unsDoss=null, unsArt=null;

/* ══════ HELPERS FIRESTORE ══════ */
// Chemin : users/{uid}/...
const uCol  = (...parts) => collection(db, 'users', UID, ...parts);
const uDoc  = (...parts) => doc(db, 'users', UID, ...parts);

/* ══════ TOAST ══════ */
let toastTimer;
function toast(msg, dur=2500){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display='none', dur);
}

/* ══════ MODAL CONFIRM ══════ */
function confirm2(title, msg, onOk, okLabel='Supprimer', danger=true){
  document.getElementById('m-confirm-title').textContent = title;
  document.getElementById('m-confirm-msg').textContent   = msg;
  const btn = document.getElementById('m-confirm-ok');
  btn.textContent = okLabel;
  btn.className = `btn ${danger?'btn-danger':'btn-primary'}`;
  const fresh = btn.cloneNode(true);
  btn.replaceWith(fresh);
  fresh.onclick = () => { closeModal('m-confirm'); onOk(); };
  openModal('m-confirm');
}
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
window.closeModal = closeModal;

// Fermer dropdowns au clic ailleurs
document.addEventListener('click', e => {
  if(!e.target.closest('.ddwrap'))
    document.querySelectorAll('.ddmenu.show').forEach(m=>m.classList.remove('show'));
});

/* ══════ AUTH ══════ */
window.setTab = function(tab){
  authTab = tab;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on', i===(tab==='login'?0:1)));
  document.getElementById('f-prenom').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = tab==='login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('auth-err').style.display = 'none';
};

window.doAuth = async function(){
  const email  = document.getElementById('i-email').value.trim();
  const pwd    = document.getElementById('i-pwd').value;
  const errEl  = document.getElementById('auth-err');
  errEl.style.display = 'none';
  const MSGS = {
    'auth/user-not-found':      'Aucun compte avec cet email.',
    'auth/wrong-password':      'Mot de passe incorrect.',
    'auth/invalid-credential':  'Email ou mot de passe incorrect.',
    'auth/email-already-in-use':'Email déjà utilisé.',
    'auth/weak-password':       'Mot de passe trop court (6 car. min).',
    'auth/invalid-email':       'Email invalide.',
  };
  try {
    if(authTab === 'login'){
      await signInWithEmailAndPassword(auth, email, pwd);
    } else {
      const prenom = document.getElementById('i-prenom').value.trim();
      if(!prenom){ errEl.textContent='Entrez votre prénom.'; errEl.style.display='block'; return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pwd);
      await updateProfile(cred.user, { displayName: prenom });
    }
  } catch(err){
    errEl.textContent = MSGS[err.code] || err.message;
    errEl.style.display = 'block';
  }
};
document.getElementById('i-pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') doAuth(); });

/* ══════ AUTH STATE ══════ */
onAuthStateChanged(auth, user => {
  if(user){
    UID = user.uid;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    updateProfilUI();
    startListeners();
    goPage('catalogue');
  } else {
    UID = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
    stopListeners();
  }
});

/* ══════ LISTENERS TEMPS RÉEL ══════ */
function startListeners(){
  // Catalogue — sans orderBy pour éviter les index
  unsCat = onSnapshot(uCol('catalogue'), snap => {
    catalogue = snap.docs.map(d=>({id:d.id,...d.data()}));
    // Tri côté client
    catalogue.sort((a,b)=>a.categorie.localeCompare(b.categorie)||a.nom.localeCompare(b.nom));
    renderCat();
  });

  // Listes
  unsListes = onSnapshot(uCol('listes'), snap => {
    listes = snap.docs.map(d=>({id:d.id,...d.data()}));
    listes.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    renderListes();
    renderDossierSelects();
    if(activeListeId) renderDetailHeader();
  });

  // Dossiers
  unsDoss = onSnapshot(uCol('dossiers'), snap => {
    dossiers = snap.docs.map(d=>({id:d.id,...d.data()}));
    dossiers.sort((a,b)=>a.nom.localeCompare(b.nom));
    renderDossierSelects();
    renderDossierTags();
  });
}

function stopListeners(){
  [unsCat,unsListes,unsDoss,unsArt].forEach(u=>u&&u());
}

function startArticlesListener(listeId){
  if(unsArt){ unsArt(); unsArt=null; }
  unsArt = onSnapshot(uCol('listes',listeId,'articles'), snap => {
    articles = snap.docs.map(d=>({id:d.id,...d.data()}));
    // Tri côté client
    articles.sort((a,b)=>a.categorie.localeCompare(b.categorie)||a.nom.localeCompare(b.nom));
    renderDetailArticles();
    renderDetailCat();
  });
}

/* ══════ NAVIGATION ══════ */
window.goPage = function(page){
  // Cacher toutes les pages et sous-pages
  document.querySelectorAll('.page,.subpage').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+page).classList.add('show');
  document.getElementById('nav-'+page)?.classList.add('on');
  activePage = page;
};

window.openDetail = function(listeId){
  activeListeId = listeId;
  articles = [];
  document.querySelectorAll('.page,.subpage').forEach(p=>p.classList.remove('show'));
  document.getElementById('page-detail').classList.add('show');
  document.getElementById('add-body').classList.remove('show');
  document.getElementById('d-search').value = '';
  renderDetailHeader();
  renderDetailArticles();
  startArticlesListener(listeId);
};

window.closeDetail = function(){
  if(unsArt){ unsArt(); unsArt=null; }
  activeListeId = null; articles = [];
  goPage('listes');
};

/* ══════ CATALOGUE ══════ */
window.addProduit = async function(){
  const nom = document.getElementById('c-nom').value.trim();
  const cat = document.getElementById('c-cat').value;
  if(!nom){ toast('⚠️ Entrez un nom de produit'); return; }
  // Vérif doublon
  if(catalogue.some(p=>p.nom.toLowerCase()===nom.toLowerCase())){
    toast('⚠️ Ce produit existe déjà dans le catalogue'); return;
  }
  try{
    await addDoc(uCol('catalogue'), { nom, categorie:cat, createdAt:serverTimestamp() });
    document.getElementById('c-nom').value = '';
    toast('✅ "'+nom+'" ajouté au catalogue');
  }catch(e){ toast('❌ Erreur: '+e.message); }
};

window.delProduit = function(id, nom){
  confirm2('Supprimer "'+nom+'" ?', 'Ce produit sera supprimé du catalogue définitivement.', async()=>{
    await deleteDoc(uDoc('catalogue',id));
    sel.delete(id); updateSelBar();
    toast('🗑️ Produit supprimé');
  });
};

// Sélection
window.toggleSel = function(id){
  sel.has(id) ? sel.delete(id) : sel.add(id);
  updateSelBar();
  renderCat();
};
window.clearSel = function(){
  sel.clear(); updateSelBar(); renderCat();
};
function updateSelBar(){
  const bar = document.getElementById('sel-bar');
  bar.classList.toggle('show', sel.size>0);
  document.getElementById('sel-count').textContent = sel.size+' sélectionné(s)';
}

// Ajouter sélection à une liste
window.addSelToListe = function(){
  const lEC = listes.filter(l=>l.statut==='en_cours');
  if(!lEC.length){ toast('⚠️ Créez d\'abord une liste dans "Mes listes"'); return; }
  if(lEC.length===1){ doAddSelToListe(lEC[0].id, lEC[0].nom); return; }
  // Plusieurs listes : popup choix
  document.getElementById('m-listes-choix').innerHTML = lEC.map(l=>
    `<button class="btn btn-outline" style="justify-content:flex-start" onclick="doAddSelToListe('${l.id}','${esc(l.nom)}')">🛒 ${l.nom}</button>`
  ).join('');
  openModal('m-listes');
};

window.doAddSelToListe = async function(listeId, listNom){
  closeModal('m-listes');
  const produits = catalogue.filter(p=>sel.has(p.id));
  if(!produits.length){ toast('⚠️ Aucun produit sélectionné'); return; }
  try{
    // Charger articles existants
    const snap = await getDocs(uCol('listes',listeId,'articles'));
    const existants = snap.docs.map(d=>d.data().nom.toLowerCase());
    let nb = 0;
    for(const p of produits){
      if(!existants.includes(p.nom.toLowerCase())){
        await addDoc(uCol('listes',listeId,'articles'),{
          nom:p.nom, categorie:p.categorie, quantite:1, unite:'', coche:false, createdAt:serverTimestamp()
        });
        nb++;
      }
    }
    sel.clear(); updateSelBar(); renderCat();
    toast('✅ '+nb+' produit(s) ajouté(s) à "'+listNom+'"');
  }catch(e){ toast('❌ Erreur: '+e.message); console.error(e); }
};

// Bouton + rapide depuis catalogue
window.addRapide = async function(e, produitId, nom, cat){
  e.stopPropagation();
  const lEC = listes.filter(l=>l.statut==='en_cours');
  if(!lEC.length){ toast('⚠️ Créez d\'abord une liste dans "Mes listes"'); return; }
  const listeId = lEC[0].id;
  const listNom = lEC[0].nom;
  try{
    const snap = await getDocs(uCol('listes',listeId,'articles'));
    const existants = snap.docs.map(d=>d.data().nom.toLowerCase());
    if(existants.includes(nom.toLowerCase())){ toast('⚠️ "'+nom+'" déjà dans la liste'); return; }
    await addDoc(uCol('listes',listeId,'articles'),{
      nom, categorie:cat, quantite:1, unite:'', coche:false, createdAt:serverTimestamp()
    });
    toast('✅ "'+nom+'" ajouté à "'+listNom+'"');
  }catch(e){ toast('❌ Erreur: '+e.message); console.error(e); }
};

function renderCat(){
  const search = (document.getElementById('c-search')?.value||'').toLowerCase();
  const filtered = catalogue.filter(p=>p.nom.toLowerCase().includes(search));
  if(!filtered.length){
    document.getElementById('cat-list').innerHTML =
      '<div class="empty"><div class="empty-icon">🛒</div><p>'+
      (search?'Aucun produit trouvé.':'Catalogue vide.<br>Ajoutez vos produits habituels !')+'</p></div>';
    return;
  }
  // Grouper par catégorie (déjà trié côté client)
  const groups = {};
  CATS.forEach(c=>groups[c.id]=[]);
  filtered.forEach(p=>{ if(groups[p.categorie]) groups[p.categorie].push(p); else groups['autre'].push(p); });

  const lEC = listes.filter(l=>l.statut==='en_cours');

  let html = '';
  CATS.forEach(cat=>{
    const items = groups[cat.id]||[];
    if(!items.length) return;
    html += '<div class="cat-group"><div class="cat-title"><span>'+cat.label+'</span></div>';
    items.forEach(p=>{
      const isSel = sel.has(p.id);
      const ne = esc(p.nom);
      let btnPlus = '';
      if(lEC.length>=1){
        btnPlus = `<button class="btn btn-primary btn-sm" onclick="addRapide(event,'${p.id}','${ne}','${p.categorie}')" title="Ajouter à ${lEC[0].nom}">+ Liste</button>`;
      }
      html += `<div class="prod-row">
        <div class="chk ${isSel?'on':''}" onclick="toggleSel('${p.id}')" title="Sélectionner">
          <svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M2 7L5 10L11 3"/></svg>
        </div>
        <span class="prod-nom">${p.nom}</span>
        ${btnPlus}
        <button class="btn btn-danger btn-sm" onclick="delProduit('${p.id}','${ne}')">🗑️</button>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('cat-list').innerHTML = html;
}

window.addListe = async function(){
  const nom    = document.getElementById('i-liste').value.trim();
  const dossier= document.getElementById('i-liste-dossier').value;
  if(!nom){ toast('⚠️ Entrez un nom de liste'); return; }
  try{
    const ref = await addDoc(uCol('listes'),{
      nom, dossier, statut:'en_cours', createdAt:serverTimestamp()
    });
    document.getElementById('i-liste').value = '';
    toast('✅ Liste "'+nom+'" créée');
    openDetail(ref.id);
  }catch(e){ toast('❌ Erreur: '+e.message); console.error(e); }
};

window.validerListe = async function(id, statut){
  const nouveau = statut==='terminee' ? 'en_cours' : 'terminee';
  await updateDoc(uDoc('listes',id), { statut:nouveau });
  toast(nouveau==='terminee' ? '✅ Courses terminées !' : '🔄 Liste réouverte');
  if(activeListeId===id) renderDetailHeader();
};

window.dupliquerListe = async function(id){
  const liste = listes.find(l=>l.id===id);
  if(!liste) return;
  toast('⏳ Duplication en cours…');
  try{
    const newRef = await addDoc(uCol('listes'),{
      nom:liste.nom+' (copie)', dossier:liste.dossier||'', statut:'en_cours', createdAt:serverTimestamp()
    });
    const snap = await getDocs(uCol('listes',id,'articles'));
    for(const d of snap.docs){
      const a = d.data();
      await addDoc(uCol('listes',newRef.id,'articles'),{
        nom:a.nom, categorie:a.categorie, quantite:a.quantite||1,
        unite:a.unite||'', coche:false, createdAt:serverTimestamp()
      });
    }
    toast('✅ Liste dupliquée !');
  }catch(e){ toast('❌ Erreur: '+e.message); }
};

window.renommerListe = async function(id, ancien){
  const nouveau = prompt('Nouveau nom :', ancien);
  if(!nouveau||!nouveau.trim()) return;
  await updateDoc(uDoc('listes',id),{ nom:nouveau.trim() });
  toast('✏️ Liste renommée');
};

window.deplacerListe = function(id){
  const choix = document.getElementById('m-deplacer-choix');
  choix.innerHTML = [
    `<button class="btn btn-outline" style="justify-content:flex-start" onclick="doDeplacer('${id}','')">📋 Sans dossier</button>`,
    ...dossiers.map(d=>`<button class="btn btn-outline" style="justify-content:flex-start" onclick="doDeplacer('${id}','${esc(d.nom)}')">📁 ${d.nom}</button>`)
  ].join('');
  openModal('m-deplacer');
};

window.doDeplacer = async function(id, dossier){
  closeModal('m-deplacer');
  await updateDoc(uDoc('listes',id),{ dossier });
  toast('📁 Liste déplacée');
};

window.supprimerListe = function(id, nom){
  confirm2('Supprimer "'+nom+'" ?', 'Cette liste et tous ses articles seront supprimés définitivement.', async()=>{
    try{
      const snap = await getDocs(uCol('listes',id,'articles'));
      const batch = writeBatch(db);
      snap.docs.forEach(d=>batch.delete(d.ref));
      batch.delete(uDoc('listes',id));
      await batch.commit();
      toast('🗑️ Liste supprimée');
    }catch(e){ toast('❌ Erreur: '+e.message); }
  });
};

function renderListes(){
  const fStatut  = document.getElementById('f-statut')?.value||'';
  const fDossier = document.getElementById('f-dossier')?.value;
  let filtered = listes.slice();
  if(fStatut)              filtered = filtered.filter(l=>l.statut===fStatut);
  if(fDossier!==undefined && fDossier!=='') filtered = filtered.filter(l=>l.dossier===fDossier);

  const el = document.getElementById('listes-list');
  if(!el) return;
  if(!filtered.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">🛍️</div><p>'+(listes.length?'Aucune liste ne correspond aux filtres.':'Aucune liste.<br>Créez votre première liste de courses !')+'</p></div>';
    return;
  }

  // Grouper par dossier
  const groupMap = {'':[]};
  dossiers.forEach(d=>groupMap[d.nom]=[]);
  filtered.forEach(l=>{ if(groupMap[l.dossier]!==undefined) groupMap[l.dossier].push(l); else groupMap[''].push(l); });

  let html = '';
  Object.entries(groupMap).forEach(([doss,items])=>{
    if(!items.length) return;
    const showHeader = Object.values(groupMap).filter(v=>v.length).length > 1;
    if(showHeader) html += `<div class="cat-title" style="margin:.5rem 0 .2rem"><span>${doss?'📁 '+doss:'📋 Mes listes'}</span></div>`;
    items.forEach(l=>{
      const date = l.createdAt?.toDate ? l.createdAt.toDate().toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}) : '';
      const badge = l.statut==='terminee'
        ? '<span class="badge badge-green">✓ Terminée</span>'
        : '<span class="badge badge-blue">En cours</span>';
      const ne = esc(l.nom);
      html += `<div class="liste-card ${l.statut==='terminee'?'terminee':''}" onclick="openDetail('${l.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
          <div style="flex:1;min-width:0">
            <div class="liste-nom">${l.nom} ${badge}</div>
            <div class="liste-meta">${l.dossier?'📁 '+l.dossier+' · ':''}📅 ${date}</div>
          </div>
          <div class="ddwrap" style="position:relative" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="this.nextElementSibling.classList.toggle('show')" style="font-size:1.2rem;padding:.25rem .5rem">⋮</button>
            <div class="ddmenu">
              <button class="dditem" onclick="renommerListe('${l.id}','${ne}')">✏️ Renommer</button>
              <button class="dditem" onclick="dupliquerListe('${l.id}')">📋 Dupliquer</button>
              <button class="dditem" onclick="deplacerListe('${l.id}')">📁 Déplacer</button>
              <button class="dditem" onclick="validerListe('${l.id}','${l.statut}')">${l.statut==='terminee'?'🔄 Réouvrir':'✅ Terminer'}</button>
              <button class="dditem danger" onclick="supprimerListe('${l.id}','${ne}')">🗑️ Supprimer</button>
            </div>
          </div>
        </div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

/* ══════ DOSSIERS ══════ */
window.toggleDossierForm = function(){
  const f = document.getElementById('dossier-form');
  f.style.display = f.style.display==='none' ? 'block' : 'none';
};

window.addDossier = async function(){
  const nom = document.getElementById('i-dossier').value.trim();
  if(!nom){ toast('⚠️ Entrez un nom de dossier'); return; }
  if(dossiers.some(d=>d.nom.toLowerCase()===nom.toLowerCase())){ toast('⚠️ Ce dossier existe déjà'); return; }
  await addDoc(uCol('dossiers'),{ nom, createdAt:serverTimestamp() });
  document.getElementById('i-dossier').value = '';
  toast('📁 Dossier "'+nom+'" créé');
};

window.delDossier = function(id, nom){
  confirm2('Supprimer le dossier "'+nom+'" ?','Les listes resteront sans dossier.', async()=>{
    await deleteDoc(uDoc('dossiers',id));
    toast('🗑️ Dossier supprimé');
  });
};

function renderDossierSelects(){
  const opts = '<option value="">Sans dossier</option>'+dossiers.map(d=>`<option value="${d.nom}">${d.nom}</option>`).join('');
  const s1 = document.getElementById('i-liste-dossier');
  if(s1) s1.innerHTML = opts;
  const s2 = document.getElementById('f-dossier');
  if(s2) s2.innerHTML = '<option value="">Tous les dossiers</option>'+dossiers.map(d=>`<option value="${d.nom}">📁 ${d.nom}</option>`).join('');
}

function renderDossierTags(){
  const el = document.getElementById('dossiers-tags');
  if(!el) return;
  el.innerHTML = dossiers.map(d=>
    `<div style="display:flex;align-items:center;gap:.25rem;background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:.2rem .7rem .2rem .85rem;font-size:.8rem;font-weight:600;color:var(--text2)">
      📁 ${d.nom}
      <button onclick="delDossier('${d.id}','${esc(d.nom)}')" style="color:var(--red);font-size:.85rem;line-height:1;cursor:pointer;padding:.1rem .2rem;background:none;border:none">✕</button>
    </div>`
  ).join('');
}

/* ══════ DÉTAIL LISTE ══════ */
function renderDetailHeader(){
  const liste = listes.find(l=>l.id===activeListeId);
  if(!liste) return;
  const total  = articles.length;
  const coches = articles.filter(a=>a.coche).length;
  const pct    = total ? Math.round(coches/total*100) : 0;
  const termine= liste.statut==='terminee';

  // Cacher/montrer section ajout
  document.getElementById('add-section').style.display = termine ? 'none' : 'block';

  document.getElementById('detail-header').innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:${total?'.5rem':'.9rem'}">
      <div style="min-width:0">
        <h2 style="font-size:1.3rem;font-weight:900;color:var(--text);word-break:break-word">${liste.nom}</h2>
        ${liste.dossier?`<div style="font-size:.76rem;color:var(--text3);margin-top:.1rem">📁 ${liste.dossier}</div>`:''}
      </div>
      <div style="display:flex;gap:.4rem;flex-shrink:0">
        <button class="btn btn-outline btn-sm" onclick="printListe()" title="Imprimer">🖨️</button>
        <button class="btn btn-sm ${termine?'btn-ghost':'btn-success'}" onclick="validerListe('${liste.id}','${liste.statut}')">
          ${termine?'🔄 Réouvrir':'✅ Terminer'}
        </button>
      </div>
    </div>
    ${total?`
    <div style="display:flex;justify-content:space-between;font-size:.76rem;color:var(--text3);margin-bottom:.3rem">
      <span>${coches}/${total} articles cochés</span><span>${pct}%</span>
    </div>
    <div class="progress" style="margin-bottom:.9rem"><div class="progress-fill" style="width:${pct}%"></div></div>
    `:''}
  `;
}

window.toggleAddPanel = function(){
  document.getElementById('add-body').classList.toggle('show');
  renderDetailCat();
};

window.renderDetailCat = function(){
  const search = (document.getElementById('d-search')?.value||'').toLowerCase();
  // Produits du catalogue non déjà dans la liste
  const dispo = catalogue.filter(p=>
    !articles.find(a=>a.nom.toLowerCase()===p.nom.toLowerCase()) &&
    p.nom.toLowerCase().includes(search)
  );
  const groups = {};
  CATS.forEach(c=>groups[c.id]=[]);
  dispo.forEach(p=>{ if(groups[p.categorie]) groups[p.categorie].push(p); else groups['autre'].push(p); });

  let html = '';
  CATS.forEach(cat=>{
    const items = groups[cat.id]||[];
    if(!items.length) return;
    html += `<div class="cat-title" style="padding:.5rem .1rem .2rem"><span>${cat.label}</span></div>`;
    items.forEach(p=>{
      html += `<div class="prod-row" style="cursor:pointer" onclick="addFromCat('${p.id}','${esc(p.nom)}','${p.categorie}')">
        <span style="color:var(--accent);font-size:1.1rem;font-weight:800;flex-shrink:0">+</span>
        <span class="prod-nom">${p.nom}</span>
      </div>`;
    });
  });
  if(!html) html = '<p style="font-size:.85rem;color:var(--text3);padding:.3rem 0">'+(search?'Aucun résultat.':'Tous les produits sont déjà dans la liste.')+'</p>';
  const el = document.getElementById('d-cat-list');
  if(el) el.innerHTML = html;
};

window.addFromCat = async function(id, nom, cat){
  if(articles.find(a=>a.nom.toLowerCase()===nom.toLowerCase())){
    toast('⚠️ "'+nom+'" est déjà dans la liste'); return;
  }
  try{
    await addDoc(uCol('listes',activeListeId,'articles'),{
      nom, categorie:cat, quantite:1, unite:'', coche:false, createdAt:serverTimestamp()
    });
    toast('✅ "'+nom+'" ajouté');
  }catch(e){ toast('❌ Erreur: '+e.message); console.error(e); }
};

window.addManuel = async function(){
  const nom = document.getElementById('d-man-nom').value.trim();
  const cat = document.getElementById('d-man-cat').value;
  if(!nom){ toast('⚠️ Entrez un nom'); return; }
  try{
    await addDoc(uCol('listes',activeListeId,'articles'),{
      nom, categorie:cat, quantite:1, unite:'', coche:false, createdAt:serverTimestamp()
    });
    document.getElementById('d-man-nom').value = '';
    toast('✅ "'+nom+'" ajouté');
  }catch(e){ toast('❌ Erreur: '+e.message); console.error(e); }
};

window.cocherArticle = async function(id, val){
  try{
    await updateDoc(uDoc('listes',activeListeId,'articles',id),{ coche:val });
  }catch(e){ console.error(e); }
};

window.changeQty = async function(id, delta){
  const art = articles.find(a=>a.id===id); if(!art) return;
  const newQty = Math.max(0.5, (art.quantite||1)+delta);
  await updateDoc(uDoc('listes',activeListeId,'articles',id),{ quantite:newQty });
};

window.changeUnite = async function(id, val){
  await updateDoc(uDoc('listes',activeListeId,'articles',id),{ unite:val });
};

window.delArticle = function(id, nom){
  confirm2('Retirer "'+nom+'" ?', 'Cet article sera retiré de cette liste.', async()=>{
    await deleteDoc(uDoc('listes',activeListeId,'articles',id));
    toast('🗑️ Article retiré');
  });
};

function renderDetailArticles(){
  renderDetailHeader();
  const liste   = listes.find(l=>l.id===activeListeId);
  const termine = liste?.statut==='terminee';
  if(!articles.length){
    document.getElementById('detail-articles').innerHTML =
      '<div class="empty"><div class="empty-icon">🛍️</div><p>Liste vide.<br>Ajoutez des produits depuis le catalogue !</p></div>';
    return;
  }
  const groups = {};
  CATS.forEach(c=>groups[c.id]=[]);
  articles.forEach(a=>{ if(groups[a.categorie]) groups[a.categorie].push(a); else groups['autre'].push(a); });

  let html = '';
  CATS.forEach(cat=>{
    const items = groups[cat.id]||[];
    if(!items.length) return;
    html += `<div class="cat-title"><span>${cat.label}</span></div>`;
    items.forEach(a=>{
      const uniteOpts = UNITES.map(u=>`<option value="${u}" ${(a.unite||''===u)?'selected':''}>${u||'—'}</option>`).join('');
      html += `<div class="article-card ${a.coche?'done':''}">
        <div class="article-top">
          <div class="chk ${a.coche?'on':''}" onclick="${termine?'':'cocherArticle(\''+a.id+'\','+(a.coche?'false':'true')+')'}" style="cursor:${termine?'default':'pointer'}">
            <svg viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M2 7L5 10L11 3"/></svg>
          </div>
          <span class="chk-label ${a.coche?'done':''}" style="flex:1">${a.nom}</span>
          ${!termine?`<button class="btn btn-danger btn-sm" onclick="delArticle('${a.id}','${esc(a.nom)}')">🗑️</button>`:''}
        </div>
        ${!termine?`<div class="article-qty">
          <button class="qty-btn" onclick="changeQty('${a.id}',-1)">−</button>
          <span class="qty-val">${a.quantite||1}</span>
          <button class="qty-btn" onclick="changeQty('${a.id}',1)">+</button>
          <select class="qty-unite" onchange="changeUnite('${a.id}',this.value)">${uniteOpts}</select>
        </div>`:`<div style="font-size:.78rem;color:var(--text3);padding-left:2rem;margin-top:.2rem">${a.quantite||1} ${a.unite||''}</div>`}
      </div>`;
    });
  });
  document.getElementById('detail-articles').innerHTML = html;
}

/* ══════ IMPRESSION ══════ */
window.printListe = function(){
  const liste = listes.find(l=>l.id===activeListeId);
  if(!liste||!articles.length){ toast('⚠️ Liste vide, rien à imprimer'); return; }
  const groups = {};
  CATS.forEach(c=>groups[c.id]=[]);
  articles.forEach(a=>{ if(groups[a.categorie]) groups[a.categorie].push(a); else groups['autre'].push(a); });
  const date = new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const total  = articles.length;
  const coches = articles.filter(a=>a.coche).length;

  let body = '';
  CATS.forEach(cat=>{
    const items = groups[cat.id]||[];
    if(!items.length) return;
    body += `<div class="cat">${cat.label}</div>`;
    items.forEach(a=>{
      body += `<div class="item ${a.coche?'done':''}">
        <div class="box"></div>
        <span class="nom">${a.nom}</span>
        <span class="qty">${a.quantite||1}${a.unite?' '+a.unite:''}</span>
      </div>`;
    });
  });

  const win = window.open('','_blank','width=720,height=950');
  win.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
  <title>${liste.nom} — Mes Courses</title>
  <style>
    body{font-family:'Helvetica Neue',Arial,sans-serif;padding:2cm;color:#111;font-size:14px}
    h1{font-size:22px;font-weight:900;margin-bottom:4px}
    .meta{font-size:12px;color:#666;margin-bottom:20px;border-bottom:2px solid #e5e7eb;padding-bottom:12px}
    .cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#6b7280;margin:16px 0 6px;border-bottom:1px solid #e5e7eb;padding-bottom:4px}
    .item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dotted #f0f0f0}
    .box{width:16px;height:16px;border:2px solid #9ca3af;border-radius:4px;flex-shrink:0}
    .nom{flex:1;font-size:13px;font-weight:600}
    .qty{font-size:12px;color:#6b7280;white-space:nowrap}
    .done .nom{text-decoration:line-through;color:#aaa;font-weight:400}
    .done .box{background:#d1d5db;border-color:#d1d5db}
    @page{margin:1.5cm}
  </style></head><body>
  <h1>🛒 ${liste.nom}</h1>
  <div class="meta">${date} &nbsp;•&nbsp; ${total} article${total>1?'s':''} ${coches>0?'&nbsp;•&nbsp; '+coches+' cochés':''}</div>
  ${body}
  </body></html>`);
  win.document.close();
  win.focus();
  setTimeout(()=>{ win.print(); }, 500);
};

/* ══════ PROFIL ══════ */
function updateProfilUI(){
  const user = auth.currentUser; if(!user) return;
  const nom = user.displayName||user.email||'?';
  const initials = nom.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('p-avatar').textContent = initials;
  document.getElementById('p-nom').textContent    = user.displayName||'Utilisateur';
  document.getElementById('p-email').textContent  = user.email;
  document.getElementById('p-new-nom').value      = user.displayName||'';
}

window.updateNom = async function(){
  const nom = document.getElementById('p-new-nom').value.trim();
  if(!nom){ toast('⚠️ Entrez un prénom'); return; }
  await updateProfile(auth.currentUser,{ displayName:nom });
  updateProfilUI(); toast('✅ Prénom mis à jour');
};

window.updatePwd = async function(){
  const cur = document.getElementById('p-pwd-cur').value;
  const nw  = document.getElementById('p-pwd-new').value;
  if(!cur||!nw){ toast('⚠️ Remplissez les deux champs'); return; }
  if(nw.length<6){ toast('⚠️ 6 caractères minimum'); return; }
  try{
    const cred = EmailAuthProvider.credential(auth.currentUser.email, cur);
    await reauthenticateWithCredential(auth.currentUser, cred);
    await updatePassword(auth.currentUser, nw);
    document.getElementById('p-pwd-cur').value='';
    document.getElementById('p-pwd-new').value='';
    toast('✅ Mot de passe modifié');
  }catch(e){ toast(e.code==='auth/wrong-password'?'❌ Mot de passe actuel incorrect':'❌ Erreur : '+e.message); }
};

window.doLogout = async function(){
  await signOut(auth); toast('👋 À bientôt !');
};

/* ══════ UTILITAIRES ══════ */
// Échapper les apostrophes pour les attributs HTML inline
function esc(str){ return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
</script>
