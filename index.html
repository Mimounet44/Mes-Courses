<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0f1117">
  <title>MesCourses - Gestion des courses</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0f1117; --surface: #1a1d26; --surface2: #232734; --border: #2d3242;
      --text: #edf2f7; --text2: #a0aec0; --text3: #718096;
      --accent: #6366f1; --accent2: #ef4444; --accent3: #43e97b;
      --radius: 1rem; --radius-sm: 0.75rem; --shadow: 0 8px 20px rgba(0,0,0,0.3);
      --font: 'Inter', -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; min-height: 100vh; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    .app-layout { display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1; max-width: 600px; width: 100%; margin: 0 auto; padding: 1rem 1rem 5rem 1rem; }
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem 1.5rem; max-width: 400px; width: 100%; }
    .auth-header { text-align: center; margin-bottom: 1.5rem; }
    .auth-logo { font-size: 3rem; margin-bottom: 0.5rem; }
    .auth-header h1 { font-size: 1.8rem; }
    .auth-header p { color: var(--text2); font-size: 0.9rem; }
    .auth-footer { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; text-align: center; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26,29,38,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 0.6rem 1rem 0.8rem; max-width: 600px; margin: 0 auto; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; background: none; border: none; color: var(--text2); font-size: 0.7rem; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 1rem; }
    .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }
    .nav-item.active { color: var(--accent); }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
    .section-title { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #a0aec0 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; transition: all 0.2s ease; margin-bottom: 0.8rem; cursor: pointer; }
    .card:hover { border-color: var(--accent); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.6rem 1.2rem; font-size: 0.88rem; font-weight: 500; border-radius: 2rem; border: none; cursor: pointer; transition: all 0.2s ease; background: var(--surface2); color: var(--text); font-family: var(--font); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #818cf8); color: white; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #f87171); color: white; }
    .btn-success { background: linear-gradient(135deg, #10b981, #34d399); color: white; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
    .btn-block { width: 100%; }
    .btn-link { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.85rem; padding: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text2); margin-bottom: 0.35rem; }
    input, select { width: 100%; padding: 0.7rem 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 0.75rem; color: var(--text); font-size: 0.9rem; }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    .form-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .progress-bar { background: var(--surface2); border-radius: 1rem; height: 6px; overflow: hidden; margin-top: 0.5rem; }
    .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent3)); height: 100%; border-radius: 1rem; transition: width 0.3s ease; }
    .article-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); gap: 0.5rem; }
    .article-info { display: flex; align-items: center; gap: 0.6rem; flex: 1; cursor: pointer; }
    .article-check { font-size: 1.2rem; width: 24px; text-align: center; }
    .article-name { font-size: 0.95rem; font-weight: 500; }
    .article-qty { font-size: 0.75rem; color: var(--text3); background: var(--surface2); padding: 0.15rem 0.4rem; border-radius: 1rem; }
    .article-coche .article-name { text-decoration: line-through; color: var(--text3); }
    .article-actions { display: flex; align-items: center; gap: 0.5rem; }
    .qty-select { width: 60px; padding: 0.3rem; font-size: 0.8rem; text-align: center; }
    .cat-group-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin: 1.2rem 0 0.6rem 0; }
    .catalogue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; margin-top: 0.5rem; }
    .catalogue-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 0.5rem; text-align: center; transition: all 0.2s; cursor: pointer; position: relative; }
    .catalogue-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .catalogue-card-emoji { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .catalogue-card-name { font-size: 0.8rem; font-weight: 500; }
    .catalogue-card-cat { font-size: 0.65rem; color: var(--text3); margin-top: 0.25rem; }
    .catalogue-card .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(239,68,68,0.8); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0; transition: opacity 0.2s; cursor: pointer; }
    .catalogue-card .edit-btn { position: absolute; top: 5px; right: 32px; background: rgba(99,102,241,0.8); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0; transition: opacity 0.2s; cursor: pointer; }
    .catalogue-card:hover .delete-btn, .catalogue-card:hover .edit-btn { opacity: 1; }
    .filter-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 2rem; color: var(--text2); cursor: pointer; font-size: 0.8rem; }
    .filter-btn.active { background: var(--accent); color: white; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 1.5rem; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 1rem; }
    .modal-buttons { display: flex; gap: 0.7rem; justify-content: flex-end; margin-top: 1rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); border-radius: 2rem; padding: 0.6rem 1.2rem; font-size: 0.85rem; z-index: 1100; backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease-out; }
    .menu-popup { position: absolute; right: 0; top: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); min-width: 140px; z-index: 50; overflow: hidden; }
    .menu-item { display: block; width: 100%; text-align: left; padding: 0.65rem 1rem; font-size: 0.88rem; background: none; border: none; color: var(--text); cursor: pointer; }
    .menu-item:hover { background: var(--surface); }
    .badge { background: var(--surface2); padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; color: var(--text2); display: inline-block; }
  </style>
</head>
<body>
  <div id="app">
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="auth-card fade-up">
          <div class="auth-header">
            <div class="auth-logo">🛒</div>
            <h1>MesCourses</h1>

          </div>
          <form id="auth-form">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="auth-email" placeholder="vous@exemple.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Mot de passe</label>
              <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>
            <div id="auth-confirm-group" class="form-group" style="display: none;">
              <label class="form-label">Confirmer</label>
              <input type="password" id="auth-confirm" placeholder="••••••••">
            </div>
            <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-block">Se connecter</button>
          </form>
          <div class="auth-footer">
            <button id="forgot-password-btn" class="btn-link" style="display: none;">Mot de passe oublié ?</button>
            <button id="switch-auth-mode" class="btn-link">Créer un compte</button>
          </div>
        </div>
      </div>
    </div>
    <div id="main-screen" class="screen">
      <div class="app-layout">
        <main class="main-content" id="main-content"></main>
        <nav class="bottom-nav">

            <span>Mes listes</span>
          </button>
          <button class="nav-item" data-page="profil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profil</span>
          </button>
        </nav>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <script>

    // CATALOGUE PRÉ-REMPLI

      { nom: "Pommes", categorie: "Fruits", emoji: "🍎" },

      { nom: "Pâtes", categorie: "Épicerie", emoji: "🍝" },

      { nom: "Café", categorie: "Boissons", emoji: "☕" },
      { nom: "Thé", categorie: "Boissons", emoji: "🍵" },
      { nom: "Jus d'orange", categorie: "Boissons", emoji: "🧃" },
      { nom: "Soda", categorie: "Boissons", emoji: "🥤" },
      { nom: "Pain", categorie: "Boulangerie", emoji: "🥖" },
      { nom: "Baguette", categorie: "Boulangerie", emoji: "🥖" },
      { nom: "Croissants", categorie: "Boulangerie", emoji: "🥐" },
      { nom: "Chocolat", categorie: "Sucreries", emoji: "🍫" },
      { nom: "Biscuits", categorie: "Sucreries", emoji: "🍪" },
      { nom: "Lessive", categorie: "Ménager", emoji: "🧺" },
      { nom: "Papier toilette", categorie: "Ménager", emoji: "🧻" },
      { nom: "Essuie-tout", categorie: "Ménager", emoji: "🧻" },
      { nom: "Dentifrice", categorie: "Hygiène", emoji: "🪥" },
      { nom: "Shampooing", categorie: "Hygiène", emoji: "🧴" },
      { nom: "Savon", categorie: "Hygiène", emoji: "🧼" }
    ];

    let currentUser = null;
    let currentListeId = null;
    let catalogue = [];
    let listes = [];
    let dossiers = [];
    let articles = [];
    let isLoginMode = true;
    let filterDossier = '__all__';
    let filterStatut = '__all__';
    let filtreCoche = '__all__';
    let showAjoutModal = false;
    let searchCatalogue = '';
    let catalogueSearch = '';
    let catalogueCategorie = '__all__';
    let showGestionCatalogue = false;

    function showToast(msg, isError) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.borderColor = isError ? '#ef4444' : '#6366f1';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    async function initCatalogue() {
      var snapshot = await db.collection('catalogue').limit(1).get();
      if (snapshot.empty) {
        showToast("📦 Installation du catalogue...", false);
        for (var i = 0; i < CATALOGUE_PAR_DEFAUT.length; i++) {
          await db.collection('catalogue').add(CATALOGUE_PAR_DEFAUT[i]);
        }
        showToast("✅ Catalogue installé avec " + CATALOGUE_PAR_DEFAUT.length + " produits !", false);
      }
    }

    async function loadCatalogue() {
      var snapshot = await db.collection('catalogue').orderBy('nom').get();
      catalogue = [];
      for (var i = 0; i < snapshot.docs.length; i++) {
        catalogue.push({ id: snapshot.docs[i].id, nom: snapshot.docs[i].data().nom, categorie: snapshot.docs[i].data().categorie, emoji: snapshot.docs[i].data().emoji });
      }
    }

    async function loadListes() {
      if (!currentUser) return;
      var snapshot = await db.collection('users').doc(currentUser.uid).collection('listes').orderBy('createdAt', 'desc').get();
      listes = [];
      for (var i = 0; i < snapshot.docs.length; i++) {
        listes.push({ id: snapshot.docs[i].id, nom: snapshot.docs[i].data().nom, dossier: snapshot.docs[i].data().dossier, statut: snapshot.docs[i].data().statut });
      }
      var dossiersSnap = await db.collection('users').doc(currentUser.uid).collection('dossiers').get();
      dossiers = [];
      for (var i = 0; i < dossiersSnap.docs.length; i++) {
        dossiers.push({ id: dossiersSnap.docs[i].id, nom: dossiersSnap.docs[i].data().nom });
      }
      renderListesPage();
    }

    async function loadArticles(listeId) {
      if (!currentUser) return [];
      var snapshot = await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').orderBy('categorie').orderBy('nom').get();
      var result = [];
      for (var i = 0; i < snapshot.docs.length; i++) {
        result.push({ id: snapshot.docs[i].id, nom: snapshot.docs[i].data().nom, quantite: snapshot.docs[i].data().quantite, categorie: snapshot.docs[i].data().categorie, coche: snapshot.docs[i].data().coche });
      }
      return result;
    }

    async function creerListe(nom, dossier) {
      if (dossier === undefined) dossier = '';
      var newListe = { nom: nom, dossier: dossier, statut: 'en_cours', createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      var docRef = await db.collection('users').doc(currentUser.uid).collection('listes').add(newListe);
      listes.unshift({ id: docRef.id, nom: nom, dossier: dossier, statut: 'en_cours' });
      renderListesPage();
      showToast('✅ Liste "' + nom + '" créée', false);
      return docRef.id;
    }

    async function supprimerListe(listeId, listeNom) {
      if (!confirm('Supprimer "' + listeNom + '" définitivement ?')) return;
      var batch = db.batch();
      var articlesSnap = await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').get();
      for (var i = 0; i < articlesSnap.docs.length; i++) {
        batch.delete(articlesSnap.docs[i].ref);
      }
      batch.delete(db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId));
      await batch.commit();
      var newListes = [];
      for (var i = 0; i < listes.length; i++) {
        if (listes[i].id !== listeId) newListes.push(listes[i]);
      }
      listes = newListes;
      renderListesPage();
      showToast('🗑️ Liste supprimée', false);
    }

    async function renommerListe(listeId) {
      var nouveauNom = prompt('Nouveau nom :');
      if (!nouveauNom || !nouveauNom.trim()) return;
      await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).update({ nom: nouveauNom.trim() });
      for (var i = 0; i < listes.length; i++) {
        if (listes[i].id === listeId) listes[i].nom = nouveauNom.trim();
      }
      renderListesPage();
      showToast('✅ Liste renommée', false);
    }

    async function dupliquerListe(listeId) {
      var original = null;
      for (var i = 0; i < listes.length; i++) {
        if (listes[i].id === listeId) original = listes[i];
      }
      if (!original) return;
      var articlesSnap = await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').get();
      var newId = await creerListe(original.nom + ' (copie)', original.dossier);
      var batch = db.batch();
      for (var i = 0; i < articlesSnap.docs.length; i++) {
        var newRef = db.collection('users').doc(currentUser.uid).collection('listes').doc(newId).collection('articles').doc();
        var data = articlesSnap.docs[i].data();
        data.coche = false;
        batch.set(newRef, data);
      }
      await batch.commit();
      showToast('✅ Liste dupliquée', false);
    }

    async function terminerListe(listeId) {
      await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).update({ statut: 'terminee' });
      for (var i = 0; i < listes.length; i++) {
        if (listes[i].id === listeId) listes[i].statut = 'terminee';
      }
      if (currentListeId === listeId) renderListePage(listeId);
      renderListesPage();
      showToast('✓ Liste terminée', false);
    }

    async function reactiverListe(listeId) {
      await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).update({ statut: 'en_cours' });
      for (var i = 0; i < listes.length; i++) {
        if (listes[i].id === listeId) listes[i].statut = 'en_cours';
      }
      if (currentListeId === listeId) renderListePage(listeId);
      renderListesPage();
      showToast('🔄 Liste réactivée', false);
    }

    async function ajouterProduit(nom, categorie, emoji) {
      if (!nom.trim()) return;
      var newProduit = { nom: nom.trim(), categorie: categorie || '', emoji: emoji || '🛍️' };
      var docRef = await db.collection('catalogue').add(newProduit);
      catalogue.push({ id: docRef.id, nom: nom.trim(), categorie: categorie, emoji: emoji });
      showToast('✅ Produit "' + nom + '" ajouté', false);
      renderCataloguePage();
    }

    async function supprimerProduit(id, nom) {
      if (!confirm('Supprimer "' + nom + '" du catalogue ?')) return;
      await db.collection('catalogue').doc(id).delete();
      var newCatalogue = [];
      for (var i = 0; i < catalogue.length; i++) {
        if (catalogue[i].id !== id) newCatalogue.push(catalogue[i]);
      }
      catalogue = newCatalogue;
      showToast('🗑️ Produit supprimé', false);
      renderCataloguePage();
    }

    async function ajouterArticle(listeId, articleData) {
      var newArticle = { nom: articleData.nom, quantite: articleData.quantite, categorie: articleData.categorie || '', coche: false, addedAt: firebase.firestore.FieldValue.serverTimestamp() };
      var docRef = await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').add(newArticle);
      if (currentListeId === listeId) {
        articles.push({ id: docRef.id, nom: articleData.nom, quantite: articleData.quantite, categorie: articleData.categorie, coche: false });
        renderListePage(listeId);
      }
      showToast('✅ "' + articleData.nom + '" ajouté', false);
    }

    async function toggleCoche(listeId, articleId) {
      var article = null;
      for (var i = 0; i < articles.length; i++) {
        if (articles[i].id === articleId) article = articles[i];
      }
      if (!article) return;
      await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').doc(articleId).update({ coche: !article.coche });
      article.coche = !article.coche;
      renderListePage(listeId);
    }

    async function supprimerArticle(listeId, articleId, articleNom) {
      if (!confirm('Supprimer "' + articleNom + '" ?')) return;
      await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').doc(articleId).delete();
      var newArticles = [];
      for (var i = 0; i < articles.length; i++) {
        if (articles[i].id !== articleId) newArticles.push(articles[i]);
      }
      articles = newArticles;
      renderListePage(listeId);
      showToast('🗑️ Article supprimé', false);
    }

    async function modifierQuantite(listeId, articleId, quantite) {
      await db.collection('users').doc(currentUser.uid).collection('listes').doc(listeId).collection('articles').doc(articleId).update({ quantite: quantite });
      for (var i = 0; i < articles.length; i++) {
        if (articles[i].id === articleId) articles[i].quantite = quantite;
      }
      renderListePage(listeId);
    }

    function ouvrirListe(listeId) {
      currentListeId = listeId;
      renderListePage(listeId);
    }

    async function renderListePage(listeId) {
      articles = await loadArticles(listeId);
      var liste = null;
      for (var i = 0; i < listes.length; i++) {
        if (listes[i].id === listeId) liste = listes[i];
      }
      if (!liste) return;
      var estTerminee = liste.statut === 'terminee';
      var total = articles.length;
      var coches = 0;
      for (var i = 0; i < articles.length; i++) {
        if (articles[i].coche) coches++;
      }
      var pct = total ? Math.round((coches / total) * 100) : 0;
      var articlesFiltres = [];
      if (filtreCoche === 'coche') {
        for (var i = 0; i < articles.length; i++) {
          if (articles[i].coche) articlesFiltres.push(articles[i]);
        }
      } else if (filtreCoche === 'non_coche') {
        for (var i = 0; i < articles.length; i++) {
          if (!articles[i].coche) articlesFiltres.push(articles[i]);
        }
      } else {
        articlesFiltres = articles.slice();
      }
      var articlesParCategorie = {};
      for (var i = 0; i < articlesFiltres.length; i++) {
        var a = articlesFiltres[i];
        var cat = a.categorie || 'Autres';
        if (!articlesParCategorie[cat]) articlesParCategorie[cat] = [];
        articlesParCategorie[cat].push(a);
      }
      var categoriesTriees = Object.keys(articlesParCategorie).sort();
      var html = '<div class="fade-up"><div class="section-header"><button class="btn btn-ghost btn-sm" onclick="renderListesPage()">← Retour</button><h2 class="section-title">' + escapeHtml(liste.nom) + '</h2>';
      if (!estTerminee) {
        html += '<button class="btn btn-success btn-sm" onclick="terminerListe(\'' + listeId + '\')">✓ Terminer</button>';
      } else {
        html += '<button class="btn btn-primary btn-sm" onclick="reactiverListe(\'' + listeId + '\')">🔄 Réactiver</button>';
      }
      html += '</div>';
      if (total > 0) {
        html += '<div><div style="display:flex;justify-content:space-between;font-size:0.8rem"><span>' + coches + '/' + total + '</span><span>' + pct + '%</span></div><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
      }
      html += '<div class="filter-group"><button class="filter-btn ' + (filtreCoche === '__all__' ? 'active' : '') + '" data-filtre-coche="__all__">Tous (' + total + ')</button><button class="filter-btn ' + (filtreCoche === 'non_coche' ? 'active' : '') + '" data-filtre-coche="non_coche">À faire (' + (total - coches) + ')</button><button class="filter-btn ' + (filtreCoche === 'coche' ? 'active' : '') + '" data-filtre-coche="coche">Cochés (' + coches + ')</button></div>';
      if (!estTerminee) {
        html += '<button class="btn btn-primary" style="width:100%;margin-bottom:1rem" id="btn-ajouter-article">+ Ajouter un article</button>';
      }
      if (articles.length === 0) {
        html += '<div class="empty-state"><p>Aucun article</p></div>';
      } else {
        for (var c = 0; c < categoriesTriees.length; c++) {
          var cat = categoriesTriees[c];
          html += '<div class="cat-group-title">' + escapeHtml(cat) + '</div>';
          var items = articlesParCategorie[cat];
          for (var i = 0; i < items.length; i++) {
            var article = items[i];
            html += '<div class="article-item ' + (article.coche ? 'article-coche' : '') + '"><div class="article-info" onclick="' + (!estTerminee ? 'toggleCoche(\'' + listeId + '\',\'' + article.id + '\')' : '') + '"><span class="article-check">' + (article.coche ? '✓' : '◯') + '</span><span class="article-name">' + escapeHtml(article.nom) + '</span>';
            if (article.quantite > 1) html += '<span class="article-qty">×' + article.quantite + '</span>';
            html += '</div>';
            if (!estTerminee) {
              html += '<div class="article-actions"><select class="qty-select" onchange="modifierQuantite(\'' + listeId + '\',\'' + article.id + '\',parseInt(this.value))">';
              for (var n = 1; n <= 10; n++) {
                html += '<option value="' + n + '" ' + (article.quantite === n ? 'selected' : '') + '>' + n + '</option>';
              }
              html += '</select><button style="background:none;border:none;cursor:pointer;font-size:1.1rem" onclick="supprimerArticle(\'' + listeId + '\',\'' + article.id + '\',\'' + escapeHtml(article.nom) + '\')">🗑️</button></div>';
            }
            html += '</div>';
          }
        }
      }
      html += '</div>';
      if (showAjoutModal) {
        var filtered = [];
        for (var i = 0; i < catalogue.length; i++) {
          if (catalogue[i].nom.toLowerCase().includes(searchCatalogue.toLowerCase())) filtered.push(catalogue[i]);
        }
        html += '<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Ajouter un article</h3><input type="text" id="search-catalogue" placeholder="Rechercher..." value="' + escapeHtml(searchCatalogue) + '" oninput="searchCatalogue=this.value;renderListePage(\'' + currentListeId + '\')">';
        if (searchCatalogue && filtered.length) {
          html += '<div style="max-height:200px;overflow-y:auto;margin:1rem 0;border-bottom:1px solid var(--border)">';
          for (var i = 0; i < Math.min(filtered.length, 10); i++) {
            var a = filtered[i];
            html += '<button class="btn btn-ghost" style="width:100%;text-align:left" onclick="ajouterArticle(\'' + currentListeId + '\',{nom:\'' + escapeHtml(a.nom) + '\',quantite:1,categorie:\'' + escapeHtml(a.categorie || '') + '\',emoji:\'' + escapeHtml(a.emoji || '') + '\'});showAjoutModal=false;renderListePage(\'' + currentListeId + '\')">' + (a.emoji || '📦') + ' ' + escapeHtml(a.nom) + (a.categorie ? ' (' + escapeHtml(a.categorie) + ')' : '') + '</button>';
          }
          html += '</div>';
        }
        html += '<form id="form-ajout-manuel"><div class="form-group"><label class="form-label">Nom</label><input type="text" id="article-nom" required></div><div class="form-row"><div class="form-group"><label class="form-label">Quantité</label><input type="number" id="article-quantite" value="1" min="1"></div><div class="form-group"><label class="form-label">Catégorie</label><input type="text" id="article-categorie" placeholder="Optionnel"></div></div><div class="modal-buttons"><button type="button" class="btn btn-ghost" onclick="closeModal()">Annuler</button><button type="submit" class="btn btn-primary">Ajouter</button></div></form></div></div>';
      }
      document.getElementById('main-content').innerHTML = html;
      var filtreBtns = document.querySelectorAll('[data-filtre-coche]');
      for (var i = 0; i < filtreBtns.length; i++) {
        filtreBtns[i].addEventListener('click', function() {
          filtreCoche = this.dataset.filtreCoche;
          renderListePage(listeId);
        });
      }
      var btnAjout = document.getElementById('btn-ajouter-article');
      if (btnAjout) {
        btnAjout.addEventListener('click', function() {
          showAjoutModal = true;
          renderListePage(listeId);
        });
      }
      var formAjout = document.getElementById('form-ajout-manuel');
      if (formAjout) {
        formAjout.addEventListener('submit', async function(e) {
          e.preventDefault();
          var nom = document.getElementById('article-nom').value.trim();
          if (nom) {
            var quantite = parseInt(document.getElementById('article-quantite').value) || 1;
            var categorie = document.getElementById('article-categorie').value;
            await ajouterArticle(listeId, { nom: nom, quantite: quantite, categorie: categorie });
            showAjoutModal = false;
            renderListePage(listeId);
          }
        });
      }
    }

    function closeModal() {
      showAjoutModal = false;
      searchCatalogue = '';
      renderListePage(currentListeId);

    function toggleMenu(btn) {
      var menu = btn.nextElementSibling;
      var isVisible = menu.style.display === 'block';
      menu.style.display = isVisible ? 'none' : 'block';
      if (!isVisible) {
        document.addEventListener('click', function close(e) {
          if (!btn.contains(e.target)) {
            menu.style.display = 'none';
            document.removeEventListener('click', close);
          }
        });
      }
    }

    }

    function renderProfilPage() {
      var user = auth.currentUser;
      var initiales = (user.displayName || user.email || 'U').split(' ').map(function(w) { return w[0]; }).join('').toUpperCase().slice(0,2);
      var html = '<div class="fade-up"><h2 class="section-title">👤 Mon Profil</h2><div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff">' + initiales + '</div><div><div style="font-weight:700">' + escapeHtml(user.displayName || 'Utilisateur') + '</div><div style="color:var(--text2);font-size:0.88rem">' + escapeHtml(user.email) + '</div></div></div><div class="card"><h3 style="font-size:0.95rem;margin-bottom:1rem;color:var(--text2)">✏️ Modifier le prénom</h3><form id="form-update-name"><div class="form-group"><label class="form-label">Prénom</label><input type="text" id="display-name" value="' + escapeHtml(user.displayName || '') + '"></div><button type="submit" class="btn btn-primary">Enregistrer</button></form></div><div class="card"><h3 style="font-size:0.95rem;margin-bottom:1rem;color:var(--text2)">ℹ️ Informations</h3><div style="font-size:0.88rem;color:var(--text2)"><div>📧 ' + escapeHtml(user.email) + '</div><div>🆔 <span style="font-family:monospace">' + user.uid + '</span></div></div></div><button id="btn-logout" class="btn btn-danger" style="width:100%">🚪 Se déconnecter</button></div>';
      document.getElementById('main-content').innerHTML = html;
      var formName = document.getElementById('form-update-name');
      if (formName) {
        formName.addEventListener('submit', async function(e) {
          e.preventDefault();
          var newName = document.getElementById('display-name').value.trim();
          if (newName) {
            try {
              await auth.currentUser.updateProfile({ displayName: newName });
              showToast('✅ Prénom mis à jour', false);
              renderProfilPage();
            } catch(err) {
              showToast('❌ Erreur', true);
            }
          }
        });
      }
      var btnLogout = document.getElementById('btn-logout');
      if (btnLogout) {
        btnLogout.addEventListener('click', async function() {
          await auth.signOut();
        });
      }
    }

    function showPage(page) {
      var navItems = document.querySelectorAll('.nav-item');
      for (var i = 0; i < navItems.length; i++) navItems[i].classList.remove('active');
      var activeNav = document.querySelector('.nav-item[data-page="' + page + '"]');
      if (activeNav) activeNav.classList.add('active');
      if (page === 'listes') renderListesPage();
      else if (page === 'catalogue') renderCataloguePage();
      else if (page === 'profil') renderProfilPage();
    }

    async function handleAuth(e) {
      e.preventDefault();
      var email = document.getElementById('auth-email').value;
      var password = document.getElementById('auth-password').value;
      var submitBtn = document.getElementById('auth-submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Chargement...';
      try {
        if (isLoginMode) {
          await auth.signInWithEmailAndPassword(email, password);
          showToast('✅ Connecté !', false);
        } else {
          var confirm = document.getElementById('auth-confirm').value;
          if (password !== confirm) {
            showToast('❌ Mots de passe différents', true);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Se connecter';
            return;
          }
          if (password.length < 6) {
            showToast('❌ 6 caractères minimum', true);
            submitBtn.disabled = false;
            submitBtn.textContent = "S'inscrire";
            return;
          }
          await auth.createUserWithEmailAndPassword(email, password);
          showToast('✅ Compte créé !', false);
        }
      } catch (err) {
        var msg = 'Erreur';
        if (err.code === 'auth/invalid-email') msg = 'Email invalide';
        else if (err.code === 'auth/user-not-found') msg = 'Compte non trouvé';
        else if (err.code === 'auth/wrong-password') msg = 'Mot de passe incorrect';
        else if (err.code === 'auth/email-already-in-use') msg = 'Email déjà utilisé';
        showToast('❌ ' + msg, true);
      }
      submitBtn.disabled = false;
      submitBtn.textContent = isLoginMode ? 'Se connecter' : "S'inscrire";
    }

    function switchAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('auth-subtitle').textContent = isLoginMode ? 'Retrouvez vos listes' : 'Créez votre compte';
      document.getElementById('auth-confirm-group').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('forgot-password-btn').style.display = isLoginMode ? 'inline-block' : 'none';
      document.getElementById('auth-submit-btn').textContent = isLoginMode ? 'Se connecter' : "S'inscrire";
      document.getElementById('switch-auth-mode').textContent = isLoginMode ? 'Créer un compte' : 'Déjà un compte ? Se connecter';
    }

    async function handleForgotPassword() {
      var email = document.getElementById('auth-email').value;
      if (!email) {
        showToast('❌ Entrez votre email', true);
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        showToast('📧 Email envoyé !', false);
      } catch(e) {
        showToast('❌ Email non trouvé', true);
      }
    }

    auth.onAuthStateChanged(async function(user) {
      currentUser = user;
      if (user) {
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        await initCatalogue();
        await loadCatalogue();
        await loadListes();
        showPage('listes');
      } else {
        document.getElementById('auth-screen').classList.add('active');
        document.getElementById('main-screen').classList.remove('active');
        listes = [];
        dossiers = [];
        articles = [];
      }
    });

    document.getElementById('auth-form').addEventListener('submit', handleAuth);
    document.getElementById('switch-auth-mode').addEventListener('click', switchAuthMode);
    document.getElementById('forgot-password-btn').addEventListener('click', handleForgotPassword);

    var navButtons = document.querySelectorAll('.nav-item');
    for (var i = 0; i < navButtons.length; i++) {
      navButtons[i].addEventListener('click', function() { showPage(this.dataset.page); });
    }

    window.ouvrirListe = ouvrirListe;
    window.renderListesPage = renderListesPage;
    window.renommerListe = renommerListe;
    window.dupliquerListe = dupliquerListe;
    window.supprimerListe = supprimerListe;
    window.terminerListe = terminerListe;
    window.reactiverListe = reactiverListe;
    window.toggleMenu = toggleMenu;
    window.ajouterArticle = ajouterArticle;
    window.toggleCoche = toggleCoche;
    window.supprimerArticle = supprimerArticle;
    window.modifierQuantite = modifierQuantite;
    window.closeModal = closeModal;
    window.copierNom = copierNom;
    window.ajouterProduit = ajouterProduit;
    window.supprimerProduit = supprimerProduit;
  </script>
</body>
</html>
