<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MesCorses - Gestion des courses</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f1117; --surface: #1a1d26; --surface2: #232734; --border: #2d3242;
      --text: #edf2f7; --text2: #a0aec0; --text3: #718096;
      --accent: #6366f1; --accent2: #ef4444; --accent3: #43e97b;
      --radius: 1rem; --font: 'Inter', -apple-system, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; }
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    .app-layout { display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1; max-width: 600px; width: 100%; margin: 0 auto; padding: 1rem 1rem 5rem 1rem; }
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1.5rem; padding: 2rem 1.5rem; max-width: 400px; width: 100%; }
    .auth-header { text-align: center; margin-bottom: 1.5rem; }
    .auth-logo { font-size: 3rem; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.6rem 1.2rem; font-size: 0.88rem; font-weight: 500; border-radius: 2rem; border: none; cursor: pointer; background: var(--surface2); color: var(--text); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; }
    .btn-block { width: 100%; }
    .btn-link { background: none; border: none; color: #6366f1; cursor: pointer; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.35rem; }
    input { width: 100%; padding: 0.7rem 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 0.75rem; color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; margin-bottom: 0.8rem; cursor: pointer; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26,29,38,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 0.6rem 1rem 0.8rem; max-width: 600px; margin: 0 auto; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; background: none; border: none; color: var(--text2); font-size: 0.7rem; cursor: pointer; }
    .nav-item.active { color: #6366f1; }
    .catalogue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.75rem; }
    .catalogue-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 0.75rem 0.5rem; text-align: center; cursor: pointer; }
    .filter-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); padding: 0.4rem 0.8rem; border-radius: 2rem; color: var(--text2); cursor: pointer; }
    .filter-btn.active { background: #6366f1; color: white; }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid #6366f1; border-radius: 2rem; padding: 0.6rem 1.2rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
  </style>
</head>
<body>
  <div id="app">
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <div class="auth-logo">🛒</div>
            <h1>MesCorses</h1>
            <p id="auth-subtitle">Retrouvez vos listes</p>
          </div>
          <form id="auth-form">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="auth-email" placeholder="vous@exemple.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Mot de passe</label>
              <input type="password" id="auth-password" placeholder="••••••••" required>
            </div>
            <div id="auth-confirm-group" class="form-group" style="display: none;">
              <label class="form-label">Confirmer</label>
              <input type="password" id="auth-confirm" placeholder="••••••••">
            </div>
            <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-block">Se connecter</button>
          </form>
          <div class="auth-footer" style="margin-top:1rem; text-align:center">
            <button id="switch-auth-mode" class="btn-link">Créer un compte</button>
          </div>
        </div>
      </div>
    </div>
    <div id="main-screen" class="screen">
      <div class="app-layout">
        <main class="main-content" id="main-content">
          <div style="text-align:center; padding:2rem">Chargement...</div>
        </main>
        <nav class="bottom-nav">
          <button class="nav-item" data-page="catalogue">📦 Catalogue</button>
          <button class="nav-item active" data-page="listes">🛍️ Listes</button>
          <button class="nav-item" data-page="profil">👤 Profil</button>
        </nav>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDMHRowm0gRH09w6qzRf89SWtE_y89KcZY",
      authDomain: "mes-courses-cf52d.firebaseapp.com",
      projectId: "mes-courses-cf52d",
      storageBucket: "mes-courses-cf52d.firebasestorage.app",
      messagingSenderId: "248641691402",
      appId: "1:248641691402:web:f36ad91dc0045d1edf24f3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // CATALOGUE DE PRODUITS
    const PRODUITS = [
      { nom: "Pommes", categorie: "Fruits", emoji: "🍎" },
      { nom: "Bananes", categorie: "Fruits", emoji: "🍌" },
      { nom: "Oranges", categorie: "Fruits", emoji: "🍊" },
      { nom: "Fraises", categorie: "Fruits", emoji: "🍓" },
      { nom: "Raisins", categorie: "Fruits", emoji: "🍇" },
      { nom: "Poires", categorie: "Fruits", emoji: "🍐" },
      { nom: "Kiwi", categorie: "Fruits", emoji: "🥝" },
      { nom: "Ananas", categorie: "Fruits", emoji: "🍍" },
      { nom: "Mangues", categorie: "Fruits", emoji: "🥭" },
      { nom: "Carottes", categorie: "Légumes", emoji: "🥕" },
      { nom: "Tomates", categorie: "Légumes", emoji: "🍅" },
      { nom: "Salade", categorie: "Légumes", emoji: "🥬" },
      { nom: "Courgettes", categorie: "Légumes", emoji: "🥒" },
      { nom: "Aubergines", categorie: "Légumes", emoji: "🍆" },
      { nom: "Poivrons", categorie: "Légumes", emoji: "🫑" },
      { nom: "Pommes de terre", categorie: "Légumes", emoji: "🥔" },
      { nom: "Brocoli", categorie: "Légumes", emoji: "🥦" },
      { nom: "Lait", categorie: "Produits laitiers", emoji: "🥛" },
      { nom: "Fromage", categorie: "Produits laitiers", emoji: "🧀" },
      { nom: "Beurre", categorie: "Produits laitiers", emoji: "🧈" },
      { nom: "Yaourts", categorie: "Produits laitiers", emoji: "🥛" },
      { nom: "Œufs", categorie: "Produits laitiers", emoji: "🥚" },
      { nom: "Poulet", categorie: "Viande", emoji: "🍗" },
      { nom: "Bœuf haché", categorie: "Viande", emoji: "🥩" },
      { nom: "Steaks", categorie: "Viande", emoji: "🥩" },
      { nom: "Jambon", categorie: "Viande", emoji: "🍖" },
      { nom: "Saumon", categorie: "Poisson", emoji: "🐟" },
      { nom: "Thon", categorie: "Poisson", emoji: "🐟" },
      { nom: "Pâtes", categorie: "Épicerie", emoji: "🍝" },
      { nom: "Riz", categorie: "Épicerie", emoji: "🍚" },
      { nom: "Sauce tomate", categorie: "Épicerie", emoji: "🍅" },
      { nom: "Huile d'olive", categorie: "Épicerie", emoji: "🫒" },
      { nom: "Sel", categorie: "Épicerie", emoji: "🧂" },
      { nom: "Farine", categorie: "Épicerie", emoji: "🌾" },
      { nom: "Sucre", categorie: "Épicerie", emoji: "🍬" },
      { nom: "Eau", categorie: "Boissons", emoji: "💧" },
      { nom: "Café", categorie: "Boissons", emoji: "☕" },
      { nom: "Jus d'orange", categorie: "Boissons", emoji: "🧃" },
      { nom: "Pain", categorie: "Boulangerie", emoji: "🥖" },
      { nom: "Croissants", categorie: "Boulangerie", emoji: "🥐" },
      { nom: "Chocolat", categorie: "Sucreries", emoji: "🍫" },
      { nom: "Biscuits", categorie: "Sucreries", emoji: "🍪" },
      { nom: "Lessive", categorie: "Ménager", emoji: "🧺" },
      { nom: "Papier toilette", categorie: "Ménager", emoji: "🧻" },
      { nom: "Dentifrice", categorie: "Hygiène", emoji: "🪥" },
      { nom: "Shampooing", categorie: "Hygiène", emoji: "🧴" }
    ];

    let currentUser = null;
    let currentPage = 'listes';
    let catalogue = [];
    let listes = [];
    let dossiers = [];
    let articles = [];
    let isLoginMode = true;

    function showToast(msg, isError) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.borderColor = isError ? '#ef4444' : '#6366f1';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    // INITIALISATION FORCée DU CATALOGUE
    async function initCatalogue() {
      try {
        console.log("Vérification du catalogue...");
        var snapshot = await db.collection('catalogue').limit(1).get();
        if (snapshot.empty) {
          console.log("Catalogue vide, installation en cours...");
          showToast("📦 Installation du catalogue...", false);
          for (var i = 0; i < PRODUITS.length; i++) {
            await db.collection('catalogue').add(PRODUITS[i]);
            if (i % 10 === 0) console.log("Ajouté " + i + " produits...");
          }
          console.log("Catalogue installé avec " + PRODUITS.length + " produits !");
          showToast("✅ " + PRODUITS.length + " produits installés !", false);
        } else {
          console.log("Catalogue déjà présent");
        }
      } catch (err) {
        console.error("Erreur init catalogue:", err);
        showToast("❌ Erreur d'accès Firestore: " + err.message, true);
      }
    }

    async function loadCatalogue() {
      try {
        var snapshot = await db.collection('catalogue').orderBy('nom').get();
        catalogue = [];
        for (var i = 0; i < snapshot.docs.length; i++) {
          catalogue.push({ id: snapshot.docs[i].id, ...snapshot.docs[i].data() });
        }
        console.log("Catalogue chargé:", catalogue.length, "produits");
        if (currentPage === 'catalogue') renderCataloguePage();
      } catch (err) {
        console.error("Erreur chargement catalogue:", err);
        showToast("❌ Erreur chargement: " + err.message, true);
      }
    }

    async function loadListes() {
      if (!currentUser) return;
      try {
        var snapshot = await db.collection('users').doc(currentUser.uid).collection('listes').orderBy('createdAt', 'desc').get();
        listes = [];
        for (var i = 0; i < snapshot.docs.length; i++) {
          listes.push({ id: snapshot.docs[i].id, ...snapshot.docs[i].data() });
        }
        var dossiersSnap = await db.collection('users').doc(currentUser.uid).collection('dossiers').get();
        dossiers = [];
        for (var i = 0; i < dossiersSnap.docs.length; i++) {
          dossiers.push({ id: dossiersSnap.docs[i].id, ...dossiersSnap.docs[i].data() });
        }
        if (currentPage === 'listes') renderListesPage();
      } catch(err) {
        console.error(err);
      }
    }

    // RENDU SIMPLIFIÉ
    function renderCataloguePage() {
      var categories = {};
      for (var i = 0; i < catalogue.length; i++) {
        if (catalogue[i].categorie) categories[catalogue[i].categorie] = true;
      }
      var catList = Object.keys(categories).sort();
      
      var html = '<div><div class="section-header" style="display:flex;justify-content:space-between;margin-bottom:1rem"><h2>📦 Catalogue</h2><button class="btn btn-primary btn-sm" id="refresh-catalogue">🔄 Rafraîchir</button></div>';
      html += '<div class="badge" style="margin-bottom:0.5rem;background:#232734;padding:0.2rem 0.5rem;border-radius:1rem">📊 ' + catalogue.length + ' produits</div>';
      
      if (catalogue.length === 0) {
        html += '<div class="empty-state"><p>Aucun produit dans le catalogue.</p><button class="btn btn-primary" id="install-catalogue">📦 Installer le catalogue</button></div>';
      } else {
        html += '<div class="catalogue-grid">';
        for (var i = 0; i < catalogue.length; i++) {
          var p = catalogue[i];
          html += '<div class="catalogue-card" onclick="copierNom(\'' + escapeHtml(p.nom) + '\')">' +
                  '<div style="font-size:1.8rem">' + (p.emoji || '🛍️') + '</div>' +
                  '<div style="font-weight:500">' + escapeHtml(p.nom) + '</div>' +
                  (p.categorie ? '<div style="font-size:0.65rem;color:#718096">' + escapeHtml(p.categorie) + '</div>' : '') +
                  '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
      document.getElementById('main-content').innerHTML = html;
      
      document.getElementById('refresh-catalogue')?.addEventListener('click', function() { loadCatalogue(); });
      document.getElementById('install-catalogue')?.addEventListener('click', async function() {
        showToast("📦 Installation...", false);
        for (var i = 0; i < PRODUITS.length; i++) {
          await db.collection('catalogue').add(PRODUITS[i]);
        }
        await loadCatalogue();
        showToast("✅ " + PRODUITS.length + " produits installés !", false);
      });
    }

    function renderListesPage() {
      var html = '<div><div class="section-header" style="display:flex;justify-content:space-between;margin-bottom:1rem"><h2>🛍️ Mes Listes</h2><button class="btn btn-primary btn-sm" id="nouvelle-liste-btn">+ Nouvelle liste</button></div>';
      if (listes.length === 0) {
        html += '<div class="empty-state"><p>Aucune liste</p><button class="btn btn-primary" id="creer-premiere-liste">+ Créer ma première liste</button></div>';
      } else {
        for (var i = 0; i < listes.length; i++) {
          var l = listes[i];
          html += '<div class="card" onclick="ouvrirListe(\'' + l.id + '\')">' +
                  '<div style="font-weight:700">' + escapeHtml(l.nom) + '</div>' +
                  (l.dossier ? '<div style="font-size:0.75rem;color:#718096">📁 ' + escapeHtml(l.dossier) + '</div>' : '') +
                  '</div>';
        }
      }
      html += '</div>';
      document.getElementById('main-content').innerHTML = html;
      
      document.getElementById('nouvelle-liste-btn')?.addEventListener('click', async function() {
        var nom = prompt("Nom de la liste :");
        if (nom && nom.trim()) {
          var newListe = { nom: nom.trim(), dossier: '', statut: 'en_cours', createdAt: new Date() };
          var docRef = await db.collection('users').doc(currentUser.uid).collection('listes').add(newListe);
          listes.unshift({ id: docRef.id, ...newListe });
          renderListesPage();
          showToast('✅ Liste "' + nom + '" créée', false);
        }
      });
      document.getElementById('creer-premiere-liste')?.addEventListener('click', async function() {
        var nom = prompt("Nom de votre première liste :");
        if (nom && nom.trim()) {
          var newListe = { nom: nom.trim(), dossier: '', statut: 'en_cours', createdAt: new Date() };
          var docRef = await db.collection('users').doc(currentUser.uid).collection('listes').add(newListe);
          listes.unshift({ id: docRef.id, ...newListe });
          renderListesPage();
          showToast('✅ Liste "' + nom + '" créée', false);
        }
      });
    }

    function renderProfilPage() {
      var html = '<div><h2>👤 Mon Profil</h2><div class="card"><div>📧 ' + escapeHtml(currentUser.email) + '</div><div>🆔 ' + currentUser.uid + '</div></div><button class="btn btn-danger" id="logout-btn" style="width:100%;margin-top:1rem">🚪 Se déconnecter</button></div>';
      document.getElementById('main-content').innerHTML = html;
      document.getElementById('logout-btn')?.addEventListener('click', async function() { await auth.signOut(); });
    }

    function ouvrirListe(listeId) {
      alert("Fonctionnalité liste en cours...");
    }

    function copierNom(nom) {
      navigator.clipboard.writeText(nom);
      showToast('📋 "' + nom + '" copié !', false);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function showPage(page) {
      currentPage = page;
      var navItems = document.querySelectorAll('.nav-item');
      for (var i = 0; i < navItems.length; i++) navItems[i].classList.remove('active');
      document.querySelector('.nav-item[data-page="' + page + '"]').classList.add('active');
      if (page === 'listes') renderListesPage();
      else if (page === 'catalogue') renderCataloguePage();
      else if (page === 'profil') renderProfilPage();
    }

    // AUTH
    async function handleAuth(e) {
      e.preventDefault();
      var email = document.getElementById('auth-email').value;
      var password = document.getElementById('auth-password').value;
      var submitBtn = document.getElementById('auth-submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Chargement...';
      try {
        if (isLoginMode) {
          await auth.signInWithEmailAndPassword(email, password);
          showToast('✅ Connecté !', false);
        } else {
          var confirm = document.getElementById('auth-confirm').value;
          if (password !== confirm) { showToast('❌ Mots de passe différents', true); submitBtn.disabled = false; submitBtn.textContent = 'Se connecter'; return; }
          if (password.length < 6) { showToast('❌ 6 caractères minimum', true); submitBtn.disabled = false; submitBtn.textContent = "S'inscrire"; return; }
          await auth.createUserWithEmailAndPassword(email, password);
          showToast('✅ Compte créé !', false);
        }
      } catch (err) {
        var msg = 'Erreur';
        if (err.code === 'auth/invalid-email') msg = 'Email invalide';
        else if (err.code === 'auth/user-not-found') msg = 'Compte non trouvé';
        else if (err.code === 'auth/wrong-password') msg = 'Mot de passe incorrect';
        else if (err.code === 'auth/email-already-in-use') msg = 'Email déjà utilisé';
        showToast('❌ ' + msg, true);
      }
      submitBtn.disabled = false;
      submitBtn.textContent = isLoginMode ? 'Se connecter' : "S'inscrire";
    }

    function switchAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('auth-subtitle').textContent = isLoginMode ? 'Retrouvez vos listes' : 'Créez votre compte';
      document.getElementById('auth-confirm-group').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('auth-submit-btn').textContent = isLoginMode ? 'Se connecter' : "S'inscrire";
      document.getElementById('switch-auth-mode').textContent = isLoginMode ? 'Créer un compte' : 'Déjà un compte ? Se connecter';
    }

    auth.onAuthStateChanged(async function(user) {
      currentUser = user;
      if (user) {
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        await initCatalogue();
        await loadCatalogue();
        await loadListes();
        showPage('listes');
      } else {
        document.getElementById('auth-screen').classList.add('active');
        document.getElementById('main-screen').classList.remove('active');
      }
    });

    document.getElementById('auth-form').addEventListener('submit', handleAuth);
    document.getElementById('switch-auth-mode').addEventListener('click', switchAuthMode);
    document.querySelectorAll('.nav-item').forEach(function(btn) {
      btn.addEventListener('click', function() { showPage(this.dataset.page); });
    });

    window.ouvrirListe = ouvrirListe;
    window.copierNom = copierNom;
  </script>
</body>
</html>
